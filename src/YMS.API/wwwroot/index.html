/* ── Exit Control (OTP) ── */
const EXIT_STATUS_COLORS = { Pending:'bg-yellow-500', Approved:'bg-blue-600', Completed:'bg-green-600', Rejected:'bg-red-600', Cancelled:'bg-gray-400' };
const EXIT_REASONS = ['Auction Sale','Borrower Release','Inter-Yard Transfer','Scrap Disposal'];

const Exits = ({ user }) => {
  const role = user?.role || '';
  const canApprove = can(role,'approveExit');

  const [rows, setRows]       = useState([]);
  const [loading, setLoading] = useState(true);
  const [statusFilter, setStatusFilter] = useState('');
  const [toast, setToast]     = useState('');

  // Create modal
  const [createModal, setCreateModal] = useState(false);
  const [vehicles, setVehicles] = useState([]);
  const [form, setForm]   = useState({ vehicleId:'', exitReason:'Auction Sale', receiverName:'', receiverContact:'', receiverIdProof:'', notes:'' });
  const [saving, setSaving] = useState(false);
  const [err, setErr]     = useState('');

  // OTP display modal (shown once after approve/regenerate)
  const [otpModal, setOtpModal] = useState(null);
  // OTP verify modal
  const [verifyModal, setVerifyModal] = useState(null);
  const [otpInput, setOtpInput] = useState('');
  const [verifyErr, setVerifyErr] = useState('');
  const [verifying, setVerifying] = useState(false);

  const showToast = m => { setToast(m); setTimeout(()=>setToast(''),3000); };

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const q = statusFilter ? `?status=${statusFilter}` : '';
      const res = await apiFetch(`/api/exits${q}`);
      if (res.ok) setRows(await res.json());
    } catch {} finally { setLoading(false); }
  }, [statusFilter]);

  useEffect(() => { load(); }, [load]);

  const openCreate = async () => {
    setForm({ vehicleId:'', exitReason:'Auction Sale', receiverName:'', receiverContact:'', receiverIdProof:'', notes:'' });
    setErr(''); setCreateModal(true);
    // load vehicles still in yard (no exit)
    const res = await apiFetch('/api/inventory?page=1&pageSize=500');
    if (res.ok) { const d = await res.json(); setVehicles(d.items||[]); }
  };

  const handleCreate = async e => {
    e.preventDefault(); setErr(''); setSaving(true);
    try {
      const res = await apiFetch('/api/exits', { method:'POST', body: JSON.stringify({ ...form, vehicleId: Number(form.vehicleId) }) });
      if (!res.ok) { const x=await res.json(); setErr(x.message||'Error'); return; }
      setCreateModal(false); showToast('Exit request created'); load();
    } catch { setErr('Server error'); } finally { setSaving(false); }
  };

  const handleApprove = async (id, approve) => {
    let rejectionReason = null;
    if (!approve) {
      rejectionReason = prompt('Reason for rejection:');
      if (rejectionReason === null) return;
    }
    const res = await apiFetch(`/api/exits/${id}/approve`, { method:'POST', body: JSON.stringify({ approve, rejectionReason }) });
    const data = await res.json();
    if (!res.ok) { showToast(data.message||'Error'); return; }
    if (approve && data.otp) setOtpModal(data);   // show OTP once
    else showToast(data.message || 'Done');
    load();
  };

  const handleRegenerate = async (id) => {
    const res = await apiFetch(`/api/exits/${id}/regenerate-otp`, { method:'POST' });
    const data = await res.json();
    if (!res.ok) { showToast(data.message||'Error'); return; }
    setOtpModal(data); load();
  };

  const openVerify = (row) => { setOtpInput(''); setVerifyErr(''); setVerifyModal(row); };
  const handleVerify = async e => {
    e.preventDefault(); setVerifyErr(''); setVerifying(true);
    try {
      const res = await apiFetch(`/api/exits/${verifyModal.id}/verify-otp`, { method:'POST', body: JSON.stringify({ otp: otpInput }) });
      const data = await res.json();
      if (!res.ok) { setVerifyErr(data.message||'Error'); return; }
      setVerifyModal(null); showToast('Vehicle released successfully ✓'); load();
    } catch { setVerifyErr('Server error'); } finally { setVerifying(false); }
  };

  const handleCancel = async (id) => {
    if (!confirm('Cancel this exit request?')) return;
    const res = await apiFetch(`/api/exits/${id}/cancel`, { method:'POST' });
    if (res.ok || res.status===204) { showToast('Cancelled'); load(); }
  };

  const setF = (k,v) => setForm(f=>({...f,[k]:v}));
  const inp = "w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500";

  return (
    <div className="p-6">
      {toast && <div className="fixed top-4 right-4 z-50 bg-green-600 text-white px-5 py-3 rounded-xl shadow-lg text-sm">✓ {toast}</div>}

      <div className="flex items-center justify-between mb-5">
        <div>
          <h2 className="text-2xl font-bold text-gray-800">Exit Control</h2>
          <p className="text-sm text-gray-500 mt-1">Secure vehicle release — request → approve → OTP verify → exit</p>
        </div>
        <div className="flex items-center gap-2">
          <select className="border rounded-lg px-3 py-2 text-sm" value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}>
            <option value="">All Statuses</option>
            {['Pending','Approved','Completed','Rejected','Cancelled'].map(s=><option key={s}>{s}</option>)}
          </select>
          <button onClick={openCreate} className="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2 rounded-xl text-sm">
            + New Exit Request
          </button>
        </div>
      </div>

      {/* Workflow legend */}
      <div className="flex items-center gap-2 mb-5 text-xs text-gray-500 flex-wrap">
        <span className="font-semibold uppercase">Workflow:</span>
        {['Pending','Approved (OTP)','OTP Verified','Completed'].map((s,i)=>(
          <span key={s} className="flex items-center gap-2">
            <span className="bg-gray-100 px-2 py-1 rounded-lg">{s}</span>
            {i<3 && <span>→</span>}
          </span>
        ))}
      </div>

      <div className="bg-white rounded-2xl shadow-md overflow-hidden">
        {loading ? <Spinner /> : (
          <table className="w-full text-sm">
            <thead className="bg-blue-600 text-white text-xs">
              <tr>
                {['#','Vehicle','Client','Yard','Reason','Receiver','Status','Gate Pass','Created','Actions'].map(h=>(
                  <th key={h} className="px-4 py-3 text-left whitespace-nowrap font-semibold">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.length===0 ? (
                <tr><td colSpan={10} className="text-center py-16 text-gray-400">No exit requests. Click "+ New Exit Request".</td></tr>
              ) : rows.map((r,i)=>(
                <tr key={r.id} className="border-b hover:bg-blue-50 transition-colors">
                  <td className="px-4 py-3 text-gray-400 text-xs">{i+1}</td>
                  <td className="px-4 py-3 font-mono text-xs font-semibold">{r.registrationNumber}</td>
                  <td className="px-4 py-3">{r.clientName}</td>
                  <td className="px-4 py-3">{r.yardName}</td>
                  <td className="px-4 py-3 text-xs">{r.exitReason}</td>
                  <td className="px-4 py-3 text-xs">{r.receiverName}</td>
                  <td className="px-4 py-3"><span className={`badge ${EXIT_STATUS_COLORS[r.status]||'bg-gray-400'}`}>{r.status}</span></td>
                  <td className="px-4 py-3 font-mono text-xs">{r.gatePassCode||'—'}</td>
                  <td className="px-4 py-3 text-xs text-gray-500">{new Date(r.createdAt).toLocaleDateString('en-IN')}</td>
                  <td className="px-4 py-3">
                    <div className="flex items-center gap-1.5 flex-wrap">
                      {r.status==='Pending' && canApprove && (
                        <>
                          <button onClick={()=>handleApprove(r.id,true)} className="bg-green-100 hover:bg-green-200 text-green-700 px-3 py-1 rounded-lg text-xs font-medium">Approve</button>
                          <button onClick={()=>handleApprove(r.id,false)} className="bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1 rounded-lg text-xs font-medium">Reject</button>
                        </>
                      )}
                      {r.status==='Pending' && !canApprove && <span className="text-xs text-gray-400 italic">awaiting approval</span>}
                      {r.status==='Approved' && (
                        <>
                          <button onClick={()=>openVerify(r)} className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded-lg text-xs font-medium">Verify OTP</button>
                          {canApprove && !r.otpActive && <button onClick={()=>handleRegenerate(r.id)} className="bg-orange-100 hover:bg-orange-200 text-orange-700 px-3 py-1 rounded-lg text-xs font-medium">Regen OTP</button>}
                        </>
                      )}
                      {(r.status==='Pending'||r.status==='Approved') && <button onClick={()=>handleCancel(r.id)} className="bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1 rounded-lg text-xs font-medium">Cancel</button>}
                      {r.status==='Completed' && <span className="text-xs text-green-600 font-medium">✓ Exited {r.exitedAt && new Date(r.exitedAt).toLocaleDateString('en-IN')}</span>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {/* Create Modal */}
      {createModal && (
        <div className="fixed inset-0 z-40 flex items-center justify-center p-4" style={{background:'rgba(0,0,0,0.5)'}}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md">
            <div className="flex items-center justify-between px-6 py-4 border-b">
              <h3 className="text-lg font-bold text-gray-800">New Exit Request</h3>
              <button onClick={()=>setCreateModal(false)} className="text-gray-400 hover:text-gray-600 text-xl font-bold">×</button>
            </div>
            <form onSubmit={handleCreate} className="p-6 space-y-4">
              {err && <div className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-2 text-sm">{err}</div>}
              <div>
                <label className="block text-xs font-semibold text-gray-600 mb-1">Vehicle *</label>
                <select required className={inp} value={form.vehicleId} onChange={e=>setF('vehicleId',e.target.value)}>
                  <option value="">Select Vehicle</option>
                  {vehicles.map(v=><option key={v.id} value={v.id}>{v.registrationNumber} — {v.clientName} ({v.yardName})</option>)}
                </select>
              </div>
              <div>
                <label className="block text-xs font-semibold text-gray-600 mb-1">Exit Reason *</label>
                <select required className={inp} value={form.exitReason} onChange={e=>setF('exitReason',e.target.value)}>
                  {EXIT_REASONS.map(r=><option key={r}>{r}</option>)}
                </select>
              </div>
              <div>
                <label className="block text-xs font-semibold text-gray-600 mb-1">Receiver Name *</label>
                <input required className={inp} value={form.receiverName} onChange={e=>setF('receiverName',e.target.value)} placeholder="Person collecting the vehicle" />
              </div>
              <div>
                <label className="block text-xs font-semibold text-gray-600 mb-1">Receiver Contact *</label>
                <input required className={inp} value={form.receiverContact} onChange={e=>setF('receiverContact',e.target.value)} placeholder="Phone number" />
              </div>
              <div>
                <label className="block text-xs font-semibold text-gray-600 mb-1">Receiver ID Proof</label>
                <input className={inp} value={form.receiverIdProof} onChange={e=>setF('receiverIdProof',e.target.value)} placeholder="Aadhaar / PAN / DL number" />
              </div>
              <div>
                <label className="block text-xs font-semibold text-gray-600 mb-1">Notes</label>
                <textarea rows={2} className={inp} value={form.notes} onChange={e=>setF('notes',e.target.value)} />
              </div>
              <div className="flex justify-end gap-3 pt-2">
                <button type="button" onClick={()=>setCreateModal(false)} className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-5 py-2 rounded-xl text-sm">Cancel</button>
                <button type="submit" disabled={saving} className="bg-blue-600 hover:bg-blue-700 disabled:opacity-60 text-white font-semibold px-6 py-2 rounded-xl text-sm">
                  {saving?'Saving…':'Create Request'}
                </button>
              </div>
            </form>
          </div>
        </div>
      )}

      {/* OTP Display Modal (shown once) */}
      {otpModal && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:'rgba(0,0,0,0.6)'}}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center">
            <div className="text-4xl mb-2">🔐</div>
            <h3 className="text-lg font-bold text-gray-800 mb-1">Exit OTP Generated</h3>
            <p className="text-xs text-gray-500 mb-4">Share this with the yard to release the vehicle. Shown only once.</p>
            <div className="bg-blue-50 rounded-2xl py-5 mb-4">
              <p className="text-4xl font-bold tracking-[0.3em] text-blue-700">{otpModal.otp}</p>
            </div>
            <div className="text-sm text-gray-600 space-y-1 mb-5">
              <p>Gate Pass: <strong className="font-mono">{otpModal.gatePassCode}</strong></p>
              <p className="text-xs text-gray-400">Expires: {new Date(otpModal.otpExpiry).toLocaleString('en-IN')}</p>
            </div>
            <button onClick={()=>setOtpModal(null)} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl text-sm">
              I've noted the OTP
            </button>
          </div>
        </div>
      )}

      {/* Verify OTP Modal */}
      {verifyModal && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:'rgba(0,0,0,0.6)'}}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
            <div className="text-center mb-4">
              <div className="text-4xl mb-2">🚗</div>
              <h3 className="text-lg font-bold text-gray-800">Verify Exit OTP</h3>
              <p className="text-xs text-gray-500">{verifyModal.registrationNumber} · {verifyModal.receiverName}</p>
            </div>
            <form onSubmit={handleVerify} className="space-y-4">
              {verifyErr && <div className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-2 text-sm">{verifyErr}</div>}
              <input
                autoFocus inputMode="numeric" maxLength={6} required
                className="w-full text-center text-3xl tracking-[0.4em] font-bold border-2 border-gray-300 rounded-xl py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="······" value={otpInput}
                onChange={e=>setOtpInput(e.target.value.replace(/\D/g,''))} />
              <div className="flex justify-end gap-3">
                <button type="button" onClick={()=>setVerifyModal(null)} className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-5 py-2 rounded-xl text-sm">Cancel</button>
                <button type="submit" disabled={verifying||otpInput.length<6} className="bg-green-600 hover:bg-green-700 disabled:opacity-50 text-white font-semibold px-6 py-2 rounded-xl text-sm">
                  {verifying?'Verifying…':'Release Vehicle'}
                </button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  );
};

/* ── Vehicle Detail / Edit ── */
const VehicleDetail = ({ vehicleId, user, onBack }) => {
  const role = user?.role || '';
  const canEdit = ['Admin','Operations'].includes(role);
  const [vehicle, setVehicle] = useState(null);
  const [loading, setLoading] = useState(true);
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({});
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');
  const [toast, setToast] = useState('');
  const [clients, setClients] = useState([]);
  const [yards, setYards] = useState([]);
  const [projects, setProjects] = useState([]);

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''),3000); };

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const res = await apiFetch(`/api/inventory/${vehicleId}`);
      if (res.ok) { const d = await res.json(); setVehicle(d); }
    } catch {} finally { setLoading(false); }
  }, [vehicleId]);

  useEffect(() => {
    load();
    apiFetch('/api/masters/clients').then(r=>r.json()).then(setClients).catch(()=>{});
    apiFetch('/api/masters/yards').then(r=>r.json()).then(setYards).catch(()=>{});
    apiFetch('/api/project?page=1&pageSize=100').then(r=>r.ok?r.json():{items:[]}).then(d=>setProjects(d.items||[])).catch(()=>{});
  }, [load]);

  const startEdit = () => {
    setForm({
      clientId: vehicle.clientId, yardId: vehicle.yardId, projectId: vehicle.projectId||'',
      loanNumber: vehicle.loanNumber, customerName: vehicle.customerName||'',
      branchName: vehicle.branchName||'', repoDate: vehicle.repoDate?.slice(0,10)||'',
      registrationNumber: vehicle.registrationNumber, chassisNumber: vehicle.chassisNumber,
      engineNumber: vehicle.engineNumber, make: vehicle.make||'', model: vehicle.model||'',
      variant: vehicle.variant||'', fuelType: vehicle.fuelType||'',
      transmissionType: vehicle.transmissionType||'', manufacturingYear: vehicle.manufacturingYear||'',
      vehicleType: vehicle.vehicleType, color: vehicle.color||'',
      runningStatus: vehicle.runningStatus, keyStatus: vehicle.keyStatus, rcStatus: vehicle.rcStatus,
      batteryCondition: vehicle.batteryCondition||'', tyreCondition: vehicle.tyreCondition||'',
      odometerReading: vehicle.odometerReading||'', insuranceAvailable: vehicle.insuranceAvailable||false,
      dailyParkingRate: vehicle.dailyParkingRate||450, towingCharges: vehicle.towingCharges||0, miscCharges: vehicle.miscCharges||0,
    });
    setErr(''); setEditing(true);
  };

  const handleSave = async e => {
    e.preventDefault(); setErr(''); setSaving(true);
    try {
      const body = { ...form,
        clientId: Number(form.clientId), yardId: Number(form.yardId),
        projectId: form.projectId ? Number(form.projectId) : null,
        manufacturingYear: form.manufacturingYear ? Number(form.manufacturingYear) : null,
        odometerReading: form.odometerReading ? Number(form.odometerReading) : null,
        dailyParkingRate: Number(form.dailyParkingRate)||450,
        towingCharges: Number(form.towingCharges)||0,
        miscCharges: Number(form.miscCharges)||0,
        repoDate: form.repoDate||null,
      };
      const res = await apiFetch(`/api/inventory/${vehicleId}`, { method:'PUT', body: JSON.stringify(body) });
      if (!res.ok) { const e=await res.json(); setErr(e.message||'Error'); return; }
      const updated = await res.json();
      setVehicle(updated); setEditing(false);
      showToast('Vehicle updated successfully!');
    } catch { setErr('Server error'); } finally { setSaving(false); }
  };

  const setF = (k,v) => setForm(f=>({...f,[k]:v}));
  const inp = "w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500";

  if (loading) return <div className="p-6"><Spinner /></div>;
  if (!vehicle) return (
    <div className="p-6 text-center">
      <p className="text-red-500">Vehicle not found.</p>
      <button onClick={onBack} className="mt-4 btn-secondary text-sm">← Back</button>
    </div>
  );

  const days = vehicle.daysInYard || Math.max(1, Math.floor((Date.now() - new Date(vehicle.entryDate)) / 86400000) + 1);
  const dailyRate = vehicle.dailyParkingRate || 0;
  const totalParking = dailyRate * days;
  const grandTotal = totalParking + (vehicle.towingCharges||0) + (vehicle.miscCharges||0);

  const InfoRow = ({label, value, colored}) => (
    <div className="flex justify-between py-1.5 border-b border-gray-100 last:border-0">
      <span className="text-xs text-gray-500 font-medium">{label}</span>
      <span className={`text-xs font-semibold ${colored||'text-gray-800'}`}>{value||'—'}</span>
    </div>
  );

  const Section = ({title, children}) => (
    <div className="bg-white rounded-2xl shadow-sm p-5 mb-4">
      <h3 className="text-xs font-bold uppercase tracking-wide text-gray-500 mb-3 pb-2 border-b">{title}</h3>
      {children}
    </div>
  );

  return (
    <div className="p-6 max-w-5xl mx-auto">
      {toast && <div className="fixed top-4 right-4 z-50 bg-green-600 text-white px-5 py-3 rounded-xl shadow-lg text-sm">✓ {toast}</div>}

      {/* Header */}
      <div className="flex items-center justify-between mb-5">
        <div>
          <button onClick={onBack} className="text-blue-600 hover:text-blue-800 text-sm font-medium mb-1 flex items-center gap-1">← Back to Inventory</button>
          <h2 className="text-2xl font-bold text-gray-800">{vehicle.registrationNumber}</h2>
          <p className="text-sm text-gray-500">{vehicle.vehicleType} · {vehicle.clientName} · {vehicle.yardName}</p>
        </div>
        <div className="flex items-center gap-2">
          <Badge text={vehicle.runningStatus} map={RUNNING} />
          <Badge text={vehicle.keyStatus} map={KEY} />
          <Badge text={vehicle.rcStatus} map={RC} />
          {canEdit && !editing && (
            <button onClick={startEdit} className="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-4 py-2 rounded-xl text-sm ml-2">
              ✏️ Edit
            </button>
          )}
        </div>
      </div>

      {/* Edit Form */}
      {editing ? (
        <form onSubmit={handleSave}>
          {err && <div className="bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 mb-4 text-sm">{err}</div>}

          {/* Loan & Owner */}
          <div className="bg-white rounded-2xl shadow-sm p-5 mb-4">
            <h3 className="text-xs font-bold uppercase tracking-wide text-gray-500 mb-3 pb-2 border-b">Loan & Ownership</h3>
            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
              {[['clientId','Client *','select'],['projectId','Project','select'],['loanNumber','Loan Number *','text'],
                ['customerName','Customer Name','text'],['branchName','Branch Name','text'],['repoDate','Repo Date','date']].map(([k,l,t])=>(
                <div key={k}><label className="block text-xs font-medium text-gray-600 mb-1">{l}</label>
                  {t==='select' && k==='clientId' ? (
                    <select required className={inp} value={form[k]} onChange={e=>setF(k,e.target.value)}>
                      <option value="">Select Client</option>
                      {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                    </select>
                  ) : t==='select' && k==='projectId' ? (
                    <select className={inp} value={form[k]} onChange={e=>setF(k,e.target.value)}>
                      <option value="">No Project</option>
                      {projects.map(p=><option key={p.id} value={p.id}>{p.projectName}</option>)}
                    </select>
                  ) : (
                    <input type={t} className={inp} value={form[k]||''} onChange={e=>setF(k,e.target.value)} />
                  )}
                </div>
              ))}
            </div>
          </div>

          {/* Vehicle Info */}
          <div className="bg-white rounded-2xl shadow-sm p-5 mb-4">
            <h3 className="text-xs font-bold uppercase tracking-wide text-gray-500 mb-3 pb-2 border-b">Vehicle Information</h3>
            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
              {[['registrationNumber','Reg No *'],['chassisNumber','Chassis No *'],['engineNumber','Engine No *'],
                ['make','Make'],['model','Model'],['variant','Variant'],['color','Color'],['manufacturingYear','Year']].map(([k,l])=>(
                <div key={k}><label className="block text-xs font-medium text-gray-600 mb-1">{l}</label>
                  <input className={inp+(k==='registrationNumber'||k==='chassisNumber'||k==='engineNumber'?' uppercase':'')}
                    value={form[k]||''} onChange={e=>setF(k,(k==='registrationNumber'||k==='chassisNumber')?e.target.value.toUpperCase():e.target.value)} />
                </div>
              ))}
              <div><label className="block text-xs font-medium text-gray-600 mb-1">Yard *</label>
                <select required className={inp} value={form.yardId} onChange={e=>setF('yardId',e.target.value)}>
                  <option value="">Select Yard</option>
                  {yards.map(y=><option key={y.id} value={y.id}>{y.name} — {y.city}</option>)}
                </select></div>
              <div><label className="block text-xs font-medium text-gray-600 mb-1">Vehicle Type *</label>
                <select required className={inp} value={form.vehicleType} onChange={e=>setF('vehicleType',e.target.value)}>
                  {['Car','Bike','Truck','Bus','Auto','Van','SUV','Other'].map(t=><option key={t}>{t}</option>)}
                </select></div>
              <div><label className="block text-xs font-medium text-gray-600 mb-1">Fuel Type</label>
                <select className={inp} value={form.fuelType} onChange={e=>setF('fuelType',e.target.value)}>
                  <option value="">Select</option>
                  {['Petrol','Diesel','CNG','Electric','Hybrid'].map(t=><option key={t}>{t}</option>)}
                </select></div>
            </div>
          </div>

          {/* Status */}
          <div className="bg-white rounded-2xl shadow-sm p-5 mb-4">
            <h3 className="text-xs font-bold uppercase tracking-wide text-gray-500 mb-3 pb-2 border-b">Status</h3>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
              <div><label className="block text-xs font-medium text-gray-600 mb-1">Running Status</label>
                <select className={inp} value={form.runningStatus} onChange={e=>setF('runningStatus',e.target.value)}>
                  {['Running','Red/Idle','Auctioned','Released','Sold','Scrap'].map(s=><option key={s}>{s}</option>)}
                </select></div>
              <div><label className="block text-xs font-medium text-gray-600 mb-1">Key Status</label>
                <select className={inp} value={form.keyStatus} onChange={e=>setF('keyStatus',e.target.value)}>
                  {['Yes','No','Duplicate Key','Missing'].map(s=><option key={s}>{s}</option>)}
                </select></div>
              <div><label className="block text-xs font-medium text-gray-600 mb-1">RC Status</label>
                <select className={inp} value={form.rcStatus} onChange={e=>setF('rcStatus',e.target.value)}>
                  {['Submitted','Pending','Not Available','Duplicate'].map(s=><option key={s}>{s}</option>)}
                </select></div>
              <div><label className="block text-xs font-medium text-gray-600 mb-1">Odometer (km)</label>
                <input type="number" min="0" className={inp} value={form.odometerReading||''} onChange={e=>setF('odometerReading',e.target.value)} /></div>
              <div><label className="block text-xs font-medium text-gray-600 mb-1">Battery Condition</label>
                <select className={inp} value={form.batteryCondition} onChange={e=>setF('batteryCondition',e.target.value)}>
                  <option value="">N/A</option>
                  {['Good','Fair','Poor','Dead'].map(s=><option key={s}>{s}</option>)}
                </select></div>
              <div><label className="block text-xs font-medium text-gray-600 mb-1">Tyre Condition</label>
                <select className={inp} value={form.tyreCondition} onChange={e=>setF('tyreCondition',e.target.value)}>
                  <option value="">N/A</option>
                  {['Good','Fair','Poor','Flat'].map(s=><option key={s}>{s}</option>)}
                </select></div>
              <div className="flex items-center gap-2 mt-5">
                <input type="checkbox" checked={!!form.insuranceAvailable} onChange={e=>setF('insuranceAvailable',e.target.checked)} className="w-4 h-4 accent-blue-600" />
                <label className="text-sm text-gray-700 font-medium">Insurance Available</label>
              </div>
            </div>
          </div>

          {/* Charges */}
          <div className="bg-white rounded-2xl shadow-sm p-5 mb-4">
            <h3 className="text-xs font-bold uppercase tracking-wide text-gray-500 mb-3 pb-2 border-b">Charges</h3>
            <div className="grid grid-cols-3 gap-4">
              <div><label className="block text-xs font-medium text-gray-600 mb-1">Daily Parking Rate (₹/day)</label>
                <input type="number" min="0" className={inp} value={form.dailyParkingRate||''} onChange={e=>setF('dailyParkingRate',e.target.value)} /></div>
              <div><label className="block text-xs font-medium text-gray-600 mb-1">Towing Charges (₹)</label>
                <input type="number" min="0" className={inp} value={form.towingCharges||''} onChange={e=>setF('towingCharges',e.target.value)} /></div>
              <div><label className="block text-xs font-medium text-gray-600 mb-1">Misc Charges (₹)</label>
                <input type="number" min="0" className={inp} value={form.miscCharges||''} onChange={e=>setF('miscCharges',e.target.value)} /></div>
            </div>
            <div className="mt-3 bg-blue-50 rounded-xl px-4 py-2 text-sm text-blue-800 font-medium">
              Preview: ₹{Number(form.dailyParkingRate||0).toFixed(0)}/day × {days} days = <strong>₹{(Number(form.dailyParkingRate||0)*days).toLocaleString('en-IN')}</strong>
              {' '}+ ₹{Number(form.towingCharges||0).toFixed(0)} + ₹{Number(form.miscCharges||0).toFixed(0)}
              {' '}= <strong>₹{(Number(form.dailyParkingRate||0)*days + Number(form.towingCharges||0) + Number(form.miscCharges||0)).toLocaleString('en-IN')}</strong>
            </div>
          </div>

          <div className="flex justify-end gap-3">
            <button type="button" onClick={()=>setEditing(false)} className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-6 py-2 rounded-xl text-sm">Cancel</button>
            <button type="submit" disabled={saving} className="bg-blue-600 hover:bg-blue-700 disabled:opacity-60 text-white font-semibold px-8 py-2 rounded-xl text-sm">
              {saving ? 'Saving…' : 'Save Changes'}
            </button>
          </div>
        </form>
      ) : (
        /* ── View Mode ── */
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
          {/* Charges Card — prominent */}
          <div className="md:col-span-3 bg-gradient-to-r from-blue-600 to-blue-800 rounded-2xl p-5 text-white">
            <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
              <div className="text-center">
                <p className="text-blue-200 text-xs">Days in Yard</p>
                <p className="text-3xl font-bold mt-1">{days}</p>
              </div>
              <div className="text-center">
                <p className="text-blue-200 text-xs">Daily Rate</p>
                <p className="text-3xl font-bold mt-1">₹{dailyRate.toLocaleString('en-IN')}</p>
              </div>
              <div className="text-center">
                <p className="text-blue-200 text-xs">Parking ({days} days)</p>
                <p className="text-3xl font-bold mt-1">₹{totalParking.toLocaleString('en-IN')}</p>
              </div>
              <div className="text-center">
                <p className="text-blue-200 text-xs">Towing + Misc</p>
                <p className="text-3xl font-bold mt-1">₹{((vehicle.towingCharges||0)+(vehicle.miscCharges||0)).toLocaleString('en-IN')}</p>
              </div>
              <div className="text-center bg-white bg-opacity-20 rounded-xl p-2">
                <p className="text-blue-100 text-xs font-semibold">TOTAL DUE</p>
                <p className="text-3xl font-bold mt-1">₹{grandTotal.toLocaleString('en-IN')}</p>
                <p className="text-blue-200 text-xs mt-1">Entry: {new Date(vehicle.entryDate).toLocaleDateString('en-IN')}</p>
              </div>
            </div>
          </div>

          {/* Left column */}
          <div>
            <Section title="Loan Details">
              <InfoRow label="Loan Number"   value={vehicle.loanNumber} />
              <InfoRow label="Customer Name" value={vehicle.customerName} />
              <InfoRow label="Branch"        value={vehicle.branchName} />
              <InfoRow label="Client"        value={vehicle.clientName} />
              <InfoRow label="Repo Date"     value={vehicle.repoDate ? new Date(vehicle.repoDate).toLocaleDateString('en-IN') : null} />
            </Section>
            <Section title="Project">
              <InfoRow label="Project" value={vehicle.projectName||'Not assigned'} colored={vehicle.projectName?'text-blue-600':undefined} />
            </Section>
          </div>

          {/* Middle column */}
          <div>
            <Section title="Vehicle Information">
              <InfoRow label="Registration" value={vehicle.registrationNumber} />
              <InfoRow label="Chassis No"   value={vehicle.chassisNumber} />
              <InfoRow label="Engine No"    value={vehicle.engineNumber} />
              <InfoRow label="Make / Model" value={[vehicle.make, vehicle.model, vehicle.variant].filter(Boolean).join(' ')} />
              <InfoRow label="Type"         value={vehicle.vehicleType} />
              <InfoRow label="Fuel"         value={vehicle.fuelType} />
              <InfoRow label="Year"         value={vehicle.manufacturingYear} />
              <InfoRow label="Color"        value={vehicle.color} />
              <InfoRow label="Odometer"     value={vehicle.odometerReading ? `${vehicle.odometerReading.toLocaleString('en-IN')} km` : null} />
            </Section>
          </div>

          {/* Right column */}
          <div>
            <Section title="Status">
              <InfoRow label="Running" value={vehicle.runningStatus} />
              <InfoRow label="Key"     value={vehicle.keyStatus} />
              <InfoRow label="RC"      value={vehicle.rcStatus} />
              <InfoRow label="Battery" value={vehicle.batteryCondition} />
              <InfoRow label="Tyres"   value={vehicle.tyreCondition} />
              <InfoRow label="Insurance" value={vehicle.insuranceAvailable?'Available':'Not Available'} />
            </Section>
            <Section title="Yard">
              <InfoRow label="Yard"  value={vehicle.yardName} />
              <InfoRow label="City"  value={vehicle.yardCity} />
              <InfoRow label="State" value={vehicle.yardState} />
            </Section>
          </div>
        </div>
      )}
    </div>
  );
};

/* ── Projects ── */
const STATUS_COLORS  = { Active:'bg-green-600','On Hold':'bg-yellow-500',Completed:'bg-blue-600',Cancelled:'bg-red-600' };
const PRIORITY_COLORS= { High:'bg-red-600', Medium:'bg-orange-500', Low:'bg-gray-400' };
const PROJ_STATUSES  = ['Active','On Hold','Completed','Cancelled'];
const PROJ_PRIORITIES= ['High','Medium','Low'];

const BLANK_PROJ = { projectName:'', description:'', clientId:'', assignedUserId:'', status:'Active', priority:'Medium', startDate: new Date().toISOString().slice(0,10), endDate:'', notes:'' };

const Projects = ({ user }) => {
  const role = user?.role || '';
  const canWrite = ['Admin','Operations'].includes(role);

  const [rows, setRows]     = useState([]);
  const [total, setTotal]   = useState(0);
  const [totalPages, setTP] = useState(1);
  const [page, setPage]     = useState(1);
  const [pageSize]          = useState(25);
  const [loading, setLoading] = useState(false);
  const [filters, setFilters] = useState({ projectName:'', clientName:'', status:'', priority:'' });
  const [applied, setApplied] = useState({});
  const [modal, setModal]   = useState(null);
  const [form, setForm]     = useState(BLANK_PROJ);
  const [saving, setSaving] = useState(false);
  const [err, setErr]       = useState('');
  const [delId, setDelId]   = useState(null);
  const [toast, setToast]   = useState('');
  const [clients, setClients] = useState([]);
  const [users, setUsers]   = useState([]);

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''),3000); };

  useEffect(() => {
    apiFetch('/api/masters/clients').then(r=>r.json()).then(setClients).catch(()=>{});
    apiFetch('/api/users').then(r=>r.ok?r.json():[]).then(setUsers).catch(()=>{});
  }, []);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const p = new URLSearchParams({ page, pageSize });
      Object.entries(applied).forEach(([k,v]) => { if(v) p.append(k,v); });
      const res = await apiFetch(`/api/project?${p}`);
      if (res.ok) {
        const d = await res.json();
        setRows(d.items || []);
        setTotal(d.totalCount || 0);
        setTP(d.totalPages || 1);
      }
    } catch {} finally { setLoading(false); }
  }, [applied, page, pageSize]);

  useEffect(() => { load(); }, [load]);

  const openCreate = () => { setForm({...BLANK_PROJ}); setErr(''); setModal({mode:'create'}); };
  const openEdit   = r  => {
    setForm({
      projectName: r.projectName, description: r.description||'', clientId: r.clientId||'',
      assignedUserId: r.assignedUserId||'', status: r.status, priority: r.priority,
      startDate: r.startDate?.slice(0,10)||'', endDate: r.endDate?.slice(0,10)||'', notes: r.notes||''
    });
    setErr(''); setModal({ mode:'edit', row:r });
  };

  const handleSave = async e => {
    e.preventDefault(); setErr(''); setSaving(true);
    try {
      const body = {
        ...form,
        clientId: Number(form.clientId),
        assignedUserId: form.assignedUserId ? Number(form.assignedUserId) : null,
        endDate: form.endDate || null,
      };
      const url    = modal.mode==='create' ? '/api/project' : `/api/project/${modal.row.id}`;
      const method = modal.mode==='create' ? 'POST' : 'PUT';
      const res = await apiFetch(url, { method, body: JSON.stringify(body) });
      if (!res.ok) { const e=await res.json(); setErr(e.message||'Error'); return; }
      setModal(null); showToast(modal.mode==='create'?'Project created!':'Project updated!'); load();
    } catch { setErr('Server error'); } finally { setSaving(false); }
  };

  const handleDelete = async () => {
    if (!delId) return;
    await apiFetch(`/api/project/${delId}`,{method:'DELETE'});
    setDelId(null); showToast('Project deleted'); load();
  };

  const setF = (k,v) => setForm(f=>({...f,[k]:v}));
  const setFil = (k,v) => setFilters(f=>({...f,[k]:v}));
  const inp = "w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500";

  return (
    <div className="p-6">
      {toast && <div className="fixed top-4 right-4 z-50 bg-green-600 text-white px-5 py-3 rounded-xl shadow-lg text-sm font-medium">✓ {toast}</div>}

      <div className="flex items-center justify-between mb-5">
        <div>
          <h2 className="text-2xl font-bold text-gray-800">Projects</h2>
          <p className="text-sm text-gray-500 mt-1">Manage repossession and inspection projects</p>
        </div>
        {canWrite && (
          <button onClick={openCreate} className="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2 rounded-xl text-sm">
            + New Project
          </button>
        )}
      </div>

      {/* Filters */}
      <div className="bg-white rounded-2xl shadow-sm p-4 mb-5 grid grid-cols-2 md:grid-cols-5 gap-3">
        <input className={inp+" text-xs"} placeholder="Project name" value={filters.projectName} onChange={e=>setFil('projectName',e.target.value)} />
        <input className={inp+" text-xs"} placeholder="Client name"  value={filters.clientName}  onChange={e=>setFil('clientName',e.target.value)} />
        <select className={inp+" text-xs"} value={filters.status}   onChange={e=>setFil('status',e.target.value)}>
          <option value="">All Statuses</option>
          {PROJ_STATUSES.map(s=><option key={s}>{s}</option>)}
        </select>
        <select className={inp+" text-xs"} value={filters.priority} onChange={e=>setFil('priority',e.target.value)}>
          <option value="">All Priorities</option>
          {PROJ_PRIORITIES.map(p=><option key={p}>{p}</option>)}
        </select>
        <div className="flex gap-2">
          <button onClick={()=>{setPage(1);setApplied({...filters});}} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold py-2 rounded-xl">Search</button>
          <button onClick={()=>{setFilters({projectName:'',clientName:'',status:'',priority:''});setApplied({});setPage(1);}} className="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 text-xs font-semibold py-2 rounded-xl">Clear</button>
        </div>
      </div>

      {/* Table */}
      <div className="bg-white rounded-2xl shadow-md overflow-hidden">
        <div className="flex items-center justify-between px-5 py-3 border-b">
          <span className="font-semibold text-gray-700 text-sm">
            {!loading && <span className="text-gray-500">({total.toLocaleString()} projects)</span>}
          </span>
        </div>
        {loading ? <Spinner /> : (
          <>
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-blue-600 text-white text-xs">
                  <tr>
                    {['#','Project Name','Client','Status','Priority','Start Date','End Date','Assigned To','Vehicles','Actions'].map(h=>(
                      <th key={h} className="px-4 py-3 text-left whitespace-nowrap font-semibold">{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {rows.length===0 ? (
                    <tr><td colSpan={10} className="text-center py-16 text-gray-400">No projects found. {canWrite && 'Click "+ New Project" to create one.'}</td></tr>
                  ) : rows.map((r,i)=>(
                    <tr key={r.id} className="border-b hover:bg-blue-50 transition-colors">
                      <td className="px-4 py-3 text-gray-400 text-xs">{(page-1)*pageSize+i+1}</td>
                      <td className="px-4 py-3 font-medium text-gray-800">{r.projectName}</td>
                      <td className="px-4 py-3 text-gray-600">{r.clientName}</td>
                      <td className="px-4 py-3"><span className={`badge ${STATUS_COLORS[r.status]||'bg-gray-400'}`}>{r.status}</span></td>
                      <td className="px-4 py-3"><span className={`badge ${PRIORITY_COLORS[r.priority]||'bg-gray-400'}`}>{r.priority}</span></td>
                      <td className="px-4 py-3 text-xs">{new Date(r.startDate).toLocaleDateString('en-IN')}</td>
                      <td className="px-4 py-3 text-xs">{r.endDate ? new Date(r.endDate).toLocaleDateString('en-IN') : '—'}</td>
                      <td className="px-4 py-3 text-xs">{r.assignedTo||'—'}</td>
                      <td className="px-4 py-3">
                        <span className="bg-blue-100 text-blue-700 px-2.5 py-0.5 rounded-full text-xs font-semibold">{r.vehicleCount}</span>
                      </td>
                      <td className="px-4 py-3">
                        <div className="flex items-center gap-2">
                          {canWrite && <button onClick={()=>openEdit(r)} className="bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1 rounded-lg text-xs font-medium">Edit</button>}
                          {role==='Admin' && <button onClick={()=>setDelId(r.id)} className="bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1 rounded-lg text-xs font-medium">Delete</button>}
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {/* Pagination */}
            <div className="flex items-center justify-between px-5 py-3 border-t text-xs text-gray-600">
              <span>Showing {Math.min((page-1)*pageSize+1,total)}–{Math.min(page*pageSize,total)} of {total}</span>
              <div className="flex gap-1">
                <button disabled={page===1} onClick={()=>setPage(p=>p-1)} className="px-3 py-1 rounded border hover:bg-gray-100 disabled:opacity-40">Previous</button>
                {Array.from({length:Math.min(5,totalPages)},(_,i)=>{
                  const p=Math.max(1,Math.min(page-2,totalPages-4))+i;
                  return <button key={p} onClick={()=>setPage(p)} className={`px-3 py-1 rounded border ${page===p?'bg-blue-600 text-white border-blue-600':'hover:bg-gray-100'}`}>{p}</button>;
                })}
                <button disabled={page>=totalPages} onClick={()=>setPage(p=>p+1)} className="px-3 py-1 rounded border hover:bg-gray-100 disabled:opacity-40">Next</button>
              </div>
              <span>Page {page} of {totalPages}</span>
            </div>
          </>
        )}
      </div>

      {/* Add/Edit Modal */}
      {modal && (
        <div className="fixed inset-0 z-40 flex items-center justify-center p-4" style={{background:'rgba(0,0,0,0.5)'}}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <div className="flex items-center justify-between px-6 py-4 border-b sticky top-0 bg-white">
              <h3 className="text-lg font-bold text-gray-800">{modal.mode==='create'?'New Project':'Edit Project'}</h3>
              <button onClick={()=>setModal(null)} className="text-gray-400 hover:text-gray-600 text-xl font-bold">×</button>
            </div>
            <form onSubmit={handleSave} className="p-6 space-y-4">
              {err && <div className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-2 text-sm">{err}</div>}

              <div><label className="block text-xs font-semibold text-gray-600 mb-1">Project Name *</label>
                <input required className={inp} value={form.projectName} onChange={e=>setF('projectName',e.target.value)} placeholder="e.g. Repo Batch Q3 2025" /></div>

              <div className="grid grid-cols-2 gap-4">
                <div><label className="block text-xs font-semibold text-gray-600 mb-1">Client *</label>
                  <select required className={inp} value={form.clientId} onChange={e=>setF('clientId',e.target.value)}>
                    <option value="">Select Client</option>
                    {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select></div>
                <div><label className="block text-xs font-semibold text-gray-600 mb-1">Assigned To</label>
                  <select className={inp} value={form.assignedUserId} onChange={e=>setF('assignedUserId',e.target.value)}>
                    <option value="">Unassigned</option>
                    {users.map(u=><option key={u.id} value={u.id}>{u.fullName} ({u.role})</option>)}
                  </select></div>
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div><label className="block text-xs font-semibold text-gray-600 mb-1">Status</label>
                  <select className={inp} value={form.status} onChange={e=>setF('status',e.target.value)}>
                    {PROJ_STATUSES.map(s=><option key={s}>{s}</option>)}
                  </select></div>
                <div><label className="block text-xs font-semibold text-gray-600 mb-1">Priority</label>
                  <div className="flex gap-2 mt-1">
                    {PROJ_PRIORITIES.map(p=>(
                      <label key={p} className={`flex-1 flex items-center justify-center gap-1 border-2 rounded-xl py-1.5 cursor-pointer text-xs font-semibold transition-colors ${form.priority===p?'border-blue-500 bg-blue-50 text-blue-700':'border-gray-200 text-gray-500 hover:border-gray-300'}`}>
                        <input type="radio" name="priority" value={p} checked={form.priority===p} onChange={()=>setF('priority',p)} className="hidden"/>
                        <span className={`w-2.5 h-2.5 rounded-full ${PRIORITY_COLORS[p]}`}/>
                        {p}
                      </label>
                    ))}
                  </div></div>
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div><label className="block text-xs font-semibold text-gray-600 mb-1">Start Date *</label>
                  <input type="date" required className={inp} value={form.startDate} onChange={e=>setF('startDate',e.target.value)} /></div>
                <div><label className="block text-xs font-semibold text-gray-600 mb-1">End Date</label>
                  <input type="date" className={inp} value={form.endDate} onChange={e=>setF('endDate',e.target.value)} /></div>
              </div>

              <div><label className="block text-xs font-semibold text-gray-600 mb-1">Description</label>
                <textarea rows={2} className={inp} value={form.description} onChange={e=>setF('description',e.target.value)} placeholder="Project description..." /></div>

              <div><label className="block text-xs font-semibold text-gray-600 mb-1">Notes</label>
                <textarea rows={2} className={inp} value={form.notes} onChange={e=>setF('notes',e.target.value)} placeholder="Internal notes..." /></div>

              <div className="flex justify-end gap-3 pt-2 border-t">
                <button type="button" onClick={()=>setModal(null)} className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-5 py-2 rounded-xl text-sm">Cancel</button>
                <button type="submit" disabled={saving} className="bg-blue-600 hover:bg-blue-700 disabled:opacity-60 text-white font-semibold px-6 py-2 rounded-xl text-sm">
                  {saving?'Saving…':modal.mode==='create'?'Create Project':'Save Changes'}
                </button>
              </div>
            </form>
          </div>
        </div>
      )}

      {/* Delete confirm */}
      {delId && (
        <div className="fixed inset-0 z-40 flex items-center justify-center p-4" style={{background:'rgba(0,0,0,0.5)'}}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center">
            <div className="text-4xl mb-3">🗑️</div>
            <h3 className="text-lg font-bold text-gray-800 mb-2">Delete Project?</h3>
            <p className="text-sm text-gray-500 mb-6">Vehicles linked to this project will be unlinked but not deleted.</p>
            <div className="flex justify-center gap-3">
              <button onClick={()=>setDelId(null)} className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-5 py-2 rounded-xl text-sm">Cancel</button>
              <button onClick={handleDelete} className="bg-red-600 hover:bg-red-700 text-white font-semibold px-5 py-2 rounded-xl text-sm">Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

/* ── Masters ── */
const MASTER_TABS = [
  { key:'clients',    label:'Clients'       },
  { key:'yards',      label:'Yards'         },
  { key:'State',      label:'States'        },
  { key:'VehicleType',label:'Vehicle Types' },
  { key:'RunningStatus', label:'Running Statuses' },
  { key:'KeyStatus',  label:'Key Statuses'  },
  { key:'RcStatus',   label:'RC Statuses'   },
  { key:'FuelType',   label:'Fuel Types'    },
  { key:'TransmissionType', label:'Transmission' },
];

const Masters = () => {
  const [tab, setTab]     = useState('clients');
  const [rows, setRows]   = useState([]);
  const [loading, setLoading] = useState(false);
  const [modal, setModal] = useState(null);
  const [form, setForm]   = useState({});
  const [saving, setSaving] = useState(false);
  const [err, setErr]     = useState('');
  const [delId, setDelId] = useState(null);
  const [toast, setToast] = useState('');

  const isItemTab    = !['clients','yards'].includes(tab);
  const isClientTab  = tab === 'clients';
  const isYardTab    = tab === 'yards';

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''),3000); };

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const url = isItemTab ? `/api/masters/items/${tab}` : `/api/masters/${tab}`;
      const res = await apiFetch(url);
      if (res.ok) setRows(await res.json());
    } catch {}
    finally { setLoading(false); }
  }, [tab]);

  useEffect(() => { setRows([]); load(); }, [load]);

  const blankForm = () => {
    if (isClientTab) return { name:'', contactPerson:'', phone:'', email:'', isActive:true };
    if (isYardTab)   return { name:'', address:'', managerName:'', contactNumber:'', city:'', state:'', isActive:true };
    return { category: tab, name:'', sortOrder:0, isActive:true };
  };

  const openCreate = () => { setForm(blankForm()); setErr(''); setModal({mode:'create'}); };
  const openEdit   = r  => {
    if (isClientTab) setForm({ name:r.name, contactPerson:r.contactPerson||'', phone:r.phone||'', email:r.email||'', isActive:r.isActive });
    else if (isYardTab) setForm({ name:r.name, address:r.address||'', managerName:r.managerName||'', contactNumber:r.contactNumber||'', city:r.city, state:r.state, isActive:r.isActive });
    else setForm({ category:r.category, name:r.name, sortOrder:r.sortOrder||0, isActive:r.isActive });
    setErr(''); setModal({ mode:'edit', row:r });
  };

  const handleSave = async e => {
    e.preventDefault(); setErr(''); setSaving(true);
    try {
      let url, method;
      if (modal.mode === 'create') {
        url = isItemTab ? '/api/masters/items' : `/api/masters/${tab}`;
        method = 'POST';
      } else {
        url = isItemTab ? `/api/masters/items/${modal.row.id}` : `/api/masters/${tab}/${modal.row.id}`;
        method = 'PUT';
      }
      const res = await apiFetch(url, { method, body: JSON.stringify(form) });
      if (!res.ok) { const e = await res.json(); setErr(e.message||'Error'); return; }
      setModal(null);
      showToast(modal.mode === 'create' ? 'Created!' : 'Updated!');
      load();
    } catch { setErr('Server error'); }
    finally { setSaving(false); }
  };

  const handleDelete = async () => {
    if (!delId) return;
    const url = isItemTab ? `/api/masters/items/${delId.id}` : `/api/masters/${delId.type}/${delId.id}`;
    const res = await apiFetch(url, { method:'DELETE' });
    setDelId(null);
    if (res.ok) { showToast('Deleted!'); load(); }
  };

  const setF = (k,v) => setForm(f=>({...f,[k]:v}));
  const inp = "w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500";

  const renderForm = () => {
    if (isClientTab) return (<>
      <div><label className="block text-xs font-semibold text-gray-600 mb-1">Name *</label><input required className={inp} value={form.name||''} onChange={e=>setF('name',e.target.value)} /></div>
      <div><label className="block text-xs font-semibold text-gray-600 mb-1">Contact Person</label><input className={inp} value={form.contactPerson||''} onChange={e=>setF('contactPerson',e.target.value)} /></div>
      <div><label className="block text-xs font-semibold text-gray-600 mb-1">Phone</label><input className={inp} value={form.phone||''} onChange={e=>setF('phone',e.target.value)} /></div>
      <div><label className="block text-xs font-semibold text-gray-600 mb-1">Email</label><input type="email" className={inp} value={form.email||''} onChange={e=>setF('email',e.target.value)} /></div>
      {modal?.mode==='edit' && <div className="flex items-center gap-2"><input type="checkbox" checked={!!form.isActive} onChange={e=>setF('isActive',e.target.checked)} className="w-4 h-4 accent-blue-600" /><label className="text-sm text-gray-700">Active</label></div>}
    </>);
    if (isYardTab) return (<>
      <div><label className="block text-xs font-semibold text-gray-600 mb-1">Yard Name *</label><input required className={inp} value={form.name||''} onChange={e=>setF('name',e.target.value)} /></div>
      <div><label className="block text-xs font-semibold text-gray-600 mb-1">City *</label><input required className={inp} value={form.city||''} onChange={e=>setF('city',e.target.value)} /></div>
      <div><label className="block text-xs font-semibold text-gray-600 mb-1">State *</label><input required className={inp} value={form.state||''} onChange={e=>setF('state',e.target.value)} /></div>
      <div><label className="block text-xs font-semibold text-gray-600 mb-1">Address</label><input className={inp} value={form.address||''} onChange={e=>setF('address',e.target.value)} /></div>
      <div><label className="block text-xs font-semibold text-gray-600 mb-1">Manager Name</label><input className={inp} value={form.managerName||''} onChange={e=>setF('managerName',e.target.value)} /></div>
      <div><label className="block text-xs font-semibold text-gray-600 mb-1">Contact Number</label><input className={inp} value={form.contactNumber||''} onChange={e=>setF('contactNumber',e.target.value)} /></div>
      {modal?.mode==='edit' && <div className="flex items-center gap-2"><input type="checkbox" checked={!!form.isActive} onChange={e=>setF('isActive',e.target.checked)} className="w-4 h-4 accent-blue-600" /><label className="text-sm text-gray-700">Active</label></div>}
    </>);
    return (<>
      <div><label className="block text-xs font-semibold text-gray-600 mb-1">Name *</label><input required className={inp} value={form.name||''} onChange={e=>setF('name',e.target.value)} placeholder="Enter value" /></div>
      <div><label className="block text-xs font-semibold text-gray-600 mb-1">Sort Order</label><input type="number" min="0" className={inp} value={form.sortOrder||0} onChange={e=>setF('sortOrder',Number(e.target.value))} /></div>
      {modal?.mode==='edit' && <div className="flex items-center gap-2"><input type="checkbox" checked={!!form.isActive} onChange={e=>setF('isActive',e.target.checked)} className="w-4 h-4 accent-blue-600" /><label className="text-sm text-gray-700">Active</label></div>}
    </>);
  };

  const renderRow = r => {
    if (isClientTab) return [r.name, r.contactPerson||'—', r.phone||'—', r.email||'—'];
    if (isYardTab)   return [r.name, r.city, r.state, r.managerName||'—', r.contactNumber||'—'];
    return [r.name, `Sort: ${r.sortOrder}`];
  };
  const headers = isClientTab ? ['Name','Contact Person','Phone','Email'] :
                  isYardTab   ? ['Name','City','State','Manager','Phone'] : ['Name','Order'];

  return (
    <div className="p-6">
      {toast && <div className="fixed top-4 right-4 z-50 bg-green-600 text-white px-5 py-3 rounded-xl shadow-lg text-sm font-medium">✓ {toast}</div>}

      <div className="flex items-center justify-between mb-5">
        <div>
          <h2 className="text-2xl font-bold text-gray-800">Master Management</h2>
          <p className="text-sm text-gray-500 mt-1">Manage clients, yards and lookup values</p>
        </div>
        <button onClick={openCreate} className="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2 rounded-xl text-sm">
          + Add {MASTER_TABS.find(t=>t.key===tab)?.label.replace(/s$/,'')}
        </button>
      </div>

      {/* Tabs */}
      <div className="flex flex-wrap gap-1 mb-5 bg-white rounded-2xl p-2 shadow-sm">
        {MASTER_TABS.map(t => (
          <button key={t.key} onClick={()=>setTab(t.key)}
            className={`px-4 py-2 rounded-xl text-xs font-semibold transition-colors ${tab===t.key ? 'bg-blue-600 text-white' : 'text-gray-600 hover:bg-gray-100'}`}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Table */}
      <div className="bg-white rounded-2xl shadow-md overflow-hidden">
        {loading ? <Spinner /> : (
          <table className="w-full text-sm">
            <thead className="bg-blue-600 text-white text-xs">
              <tr>
                <th className="px-4 py-3 text-left">#</th>
                {headers.map(h=><th key={h} className="px-4 py-3 text-left whitespace-nowrap">{h}</th>)}
                <th className="px-4 py-3 text-left">Status</th>
                <th className="px-4 py-3 text-left">Actions</th>
              </tr>
            </thead>
            <tbody>
              {rows.length===0 ? (
                <tr><td colSpan={headers.length+3} className="text-center py-12 text-gray-400">No records found</td></tr>
              ) : rows.map((r,i)=>(
                <tr key={r.id} className="border-b hover:bg-gray-50 transition-colors">
                  <td className="px-4 py-3 text-gray-400 text-xs">{i+1}</td>
                  {renderRow(r).map((v,j)=><td key={j} className="px-4 py-3 text-gray-700">{v}</td>)}
                  <td className="px-4 py-3">
                    <span className={`badge ${r.isActive!==false ? 'bg-green-600' : 'bg-gray-400'}`}>
                      {r.isActive!==false ? 'Active' : 'Inactive'}
                    </span>
                  </td>
                  <td className="px-4 py-3">
                    <div className="flex items-center gap-2">
                      <button onClick={()=>openEdit(r)} className="bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1 rounded-lg text-xs font-medium">Edit</button>
                      <button onClick={()=>setDelId({id:r.id,type:tab})} className="bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1 rounded-lg text-xs font-medium">Delete</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {/* Modal */}
      {modal && (
        <div className="fixed inset-0 z-40 flex items-center justify-center p-4" style={{background:'rgba(0,0,0,0.5)'}}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md">
            <div className="flex items-center justify-between px-6 py-4 border-b">
              <h3 className="text-lg font-bold text-gray-800">
                {modal.mode==='create' ? 'Add' : 'Edit'} {MASTER_TABS.find(t=>t.key===tab)?.label.replace(/s$/,'')}
              </h3>
              <button onClick={()=>setModal(null)} className="text-gray-400 hover:text-gray-600 text-xl font-bold">×</button>
            </div>
            <form onSubmit={handleSave} className="p-6 space-y-4">
              {err && <div className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-2 text-sm">{err}</div>}
              {renderForm()}
              <div className="flex justify-end gap-3 pt-2">
                <button type="button" onClick={()=>setModal(null)} className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-5 py-2 rounded-xl text-sm">Cancel</button>
                <button type="submit" disabled={saving} className="bg-blue-600 hover:bg-blue-700 disabled:opacity-60 text-white font-semibold px-5 py-2 rounded-xl text-sm">
                  {saving ? 'Saving…' : modal.mode==='create' ? 'Create' : 'Save'}
                </button>
              </div>
            </form>
          </div>
        </div>
      )}

      {/* Delete confirm */}
      {delId && (
        <div className="fixed inset-0 z-40 flex items-center justify-center p-4" style={{background:'rgba(0,0,0,0.5)'}}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center">
            <div className="text-4xl mb-3">🗑️</div>
            <h3 className="text-lg font-bold text-gray-800 mb-2">Delete this record?</h3>
            <p className="text-sm text-gray-500 mb-6">This cannot be undone.</p>
            <div className="flex justify-center gap-3">
              <button onClick={()=>setDelId(null)} className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-5 py-2 rounded-xl text-sm">Cancel</button>
              <button onClick={handleDelete} className="bg-red-600 hover:bg-red-700 text-white font-semibold px-5 py-2 rounded-xl text-sm">Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

/* ── User Management ── */
const EMPTY_FORM = { fullName:'', email:'', password:'', role:'Operations', isActive:true };

const UserManagement = () => {
  const [users, setUsers]   = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal]   = useState(null);   // null | {mode:'create'|'edit', user?}
  const [form, setForm]     = useState(EMPTY_FORM);
  const [saving, setSaving] = useState(false);
  const [error, setError]   = useState('');
  const [delId, setDelId]   = useState(null);
  const [toast, setToast]   = useState('');

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(''), 3000); };

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const res = await apiFetch('/api/users');
      if (res.ok) setUsers(await res.json());
    } catch {}
    finally { setLoading(false); }
  }, []);

  useEffect(() => { load(); }, [load]);

  const openCreate = () => { setForm(EMPTY_FORM); setError(''); setModal({mode:'create'}); };
  const openEdit   = (u) => {
    setForm({ fullName:u.fullName, email:u.email, password:'', role:u.role, isActive:u.isActive });
    setError('');
    setModal({ mode:'edit', user:u });
  };

  const handleSave = async (e) => {
    e.preventDefault(); setError(''); setSaving(true);
    try {
      const body = modal.mode === 'create'
        ? { fullName:form.fullName, email:form.email, password:form.password, role:form.role }
        : { fullName:form.fullName, email:form.email, role:form.role, isActive:form.isActive, password:form.password||null };
      const res = await apiFetch(
        modal.mode === 'create' ? '/api/users' : `/api/users/${modal.user.id}`,
        { method: modal.mode === 'create' ? 'POST' : 'PUT', body: JSON.stringify(body) }
      );
      if (!res.ok) {
        const err = await res.json();
        setError(err.message || 'Failed to save'); return;
      }
      setModal(null);
      showToast(modal.mode === 'create' ? 'User created!' : 'User updated!');
      load();
    } catch { setError('Server error'); }
    finally { setSaving(false); }
  };

  const handleDelete = async () => {
    if (!delId) return;
    const res = await apiFetch(`/api/users/${delId}`, { method:'DELETE' });
    setDelId(null);
    if (res.ok) { showToast('User deleted'); load(); }
    else { const e = await res.json(); showToast(e.message || 'Delete failed'); }
  };

  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const RoleBadge = ({role}) => (
    <span className={`badge ${ROLE_COLORS[role]||'bg-gray-400'}`}>{role}</span>
  );

  const inp = "w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500";

  return (
    <div className="p-6">
      {/* Toast */}
      {toast && (
        <div className="fixed top-4 right-4 z-50 bg-green-600 text-white px-5 py-3 rounded-xl shadow-lg text-sm font-medium">
          ✓ {toast}
        </div>
      )}

      <div className="flex items-center justify-between mb-6">
        <div>
          <h2 className="text-2xl font-bold text-gray-800">User Management</h2>
          <p className="text-sm text-gray-500 mt-1">Manage system users and their roles</p>
        </div>
        <button onClick={openCreate} className="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2 rounded-xl text-sm transition-colors">
          + Add User
        </button>
      </div>

      {/* Role legend */}
      <div className="flex items-center gap-3 mb-5 flex-wrap">
        <span className="text-xs text-gray-500 font-semibold uppercase tracking-wide">Roles:</span>
        {ROLES.map(r => (
          <div key={r} className="flex items-center gap-1.5 text-xs text-gray-600">
            <span className={`inline-block w-2.5 h-2.5 rounded-full ${ROLE_COLORS[r]}`} />
            <strong>{r}</strong>
            <span className="text-gray-400">—</span>
            <span>
              {r==='Admin'      && 'Full access, user management'}
              {r==='Operations' && 'Create & update inventory'}
              {r==='Yard'       && 'Create entries, update status'}
              {r==='Client'     && 'View inventory only'}
            </span>
          </div>
        ))}
      </div>

      {/* Users Table */}
      <div className="bg-white rounded-2xl shadow-md overflow-hidden">
        {loading ? <Spinner /> : (
          <table className="w-full text-sm">
            <thead className="bg-blue-600 text-white text-xs">
              <tr>
                {['#','Full Name','Email','Role','Status','Last Login','Created','Actions'].map(h => (
                  <th key={h} className="px-4 py-3 text-left font-semibold whitespace-nowrap">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {users.length === 0 ? (
                <tr><td colSpan={8} className="text-center py-16 text-gray-400">No users found</td></tr>
              ) : users.map((u, i) => (
                <tr key={u.id} className="border-b hover:bg-gray-50 transition-colors">
                  <td className="px-4 py-3 text-gray-400 text-xs">{i+1}</td>
                  <td className="px-4 py-3 font-medium text-gray-800">{u.fullName}</td>
                  <td className="px-4 py-3 text-gray-600">{u.email}</td>
                  <td className="px-4 py-3"><RoleBadge role={u.role} /></td>
                  <td className="px-4 py-3">
                    <span className={`badge ${u.isActive ? 'bg-green-600' : 'bg-gray-400'}`}>
                      {u.isActive ? 'Active' : 'Inactive'}
                    </span>
                  </td>
                  <td className="px-4 py-3 text-xs text-gray-500">
                    {u.lastLogin ? new Date(u.lastLogin).toLocaleDateString('en-IN') : '—'}
                  </td>
                  <td className="px-4 py-3 text-xs text-gray-500">
                    {new Date(u.createdAt).toLocaleDateString('en-IN')}
                  </td>
                  <td className="px-4 py-3">
                    <div className="flex items-center gap-2">
                      <button onClick={()=>openEdit(u)}
                        className="bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1 rounded-lg text-xs font-medium transition-colors">
                        Edit
                      </button>
                      <button onClick={()=>setDelId(u.id)}
                        className="bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1 rounded-lg text-xs font-medium transition-colors">
                        Delete
                      </button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {/* Add / Edit Modal */}
      {modal && (
        <div className="fixed inset-0 z-40 flex items-center justify-center p-4" style={{background:'rgba(0,0,0,0.5)'}}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md">
            <div className="flex items-center justify-between px-6 py-4 border-b">
              <h3 className="text-lg font-bold text-gray-800">
                {modal.mode === 'create' ? 'Add New User' : `Edit — ${modal.user.fullName}`}
              </h3>
              <button onClick={()=>setModal(null)} className="text-gray-400 hover:text-gray-600 text-xl font-bold">×</button>
            </div>
            <form onSubmit={handleSave} className="p-6 space-y-4">
              {error && <div className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-2 text-sm">{error}</div>}

              <div>
                <label className="block text-xs font-semibold text-gray-600 mb-1">Full Name *</label>
                <input required className={inp} value={form.fullName} onChange={e=>set('fullName',e.target.value)} placeholder="John Doe" />
              </div>
              <div>
                <label className="block text-xs font-semibold text-gray-600 mb-1">Email *</label>
                <input type="email" required className={inp} value={form.email} onChange={e=>set('email',e.target.value)} placeholder="user@yms.com" />
              </div>
              <div>
                <label className="block text-xs font-semibold text-gray-600 mb-1">
                  Password {modal.mode === 'edit' && <span className="text-gray-400 font-normal">(leave blank to keep current)</span>}
                </label>
                <input type="password" required={modal.mode==='create'} minLength={6}
                  className={inp} value={form.password} onChange={e=>set('password',e.target.value)}
                  placeholder={modal.mode==='create' ? 'Min 6 characters' : '••••••••'} />
              </div>
              <div>
                <label className="block text-xs font-semibold text-gray-600 mb-2">Role *</label>
                <div className="grid grid-cols-2 gap-2">
                  {ROLES.map(r => (
                    <label key={r} className={`flex items-center gap-2 border-2 rounded-xl px-3 py-2.5 cursor-pointer transition-colors ${form.role===r ? 'border-blue-500 bg-blue-50' : 'border-gray-200 hover:border-gray-300'}`}>
                      <input type="radio" name="role" value={r} checked={form.role===r} onChange={()=>set('role',r)} className="hidden" />
                      <span className={`w-3 h-3 rounded-full ${ROLE_COLORS[r]}`} />
                      <span className="text-sm font-medium text-gray-700">{r}</span>
                    </label>
                  ))}
                </div>
              </div>
              {modal.mode === 'edit' && (
                <div className="flex items-center gap-3">
                  <input type="checkbox" id="activeToggle" checked={form.isActive} onChange={e=>set('isActive',e.target.checked)} className="w-4 h-4 accent-blue-600" />
                  <label htmlFor="activeToggle" className="text-sm text-gray-700 font-medium">Account Active</label>
                </div>
              )}
              <div className="flex justify-end gap-3 pt-2">
                <button type="button" onClick={()=>setModal(null)} className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-5 py-2 rounded-xl text-sm">Cancel</button>
                <button type="submit" disabled={saving} className="bg-blue-600 hover:bg-blue-700 disabled:opacity-60 text-white font-semibold px-5 py-2 rounded-xl text-sm">
                  {saving ? 'Saving…' : modal.mode==='create' ? 'Create User' : 'Save Changes'}
                </button>
              </div>
            </form>
          </div>
        </div>
      )}

      {/* Delete Confirm */}
      {delId && (
        <div className="fixed inset-0 z-40 flex items-center justify-center p-4" style={{background:'rgba(0,0,0,0.5)'}}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center">
            <div className="text-4xl mb-3">🗑️</div>
            <h3 className="text-lg font-bold text-gray-800 mb-2">Delete User?</h3>
            <p className="text-sm text-gray-500 mb-6">This action cannot be undone.</p>
            <div className="flex justify-center gap-3">
              <button onClick={()=>setDelId(null)} className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-5 py-2 rounded-xl text-sm">Cancel</button>
              <button onClick={handleDelete} className="bg-red-600 hover:bg-red-700 text-white font-semibold px-5 py-2 rounded-xl text-sm">Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

/* ── App shell ── */
const App = () => {
  const [page, setPage]   = useState('login');
  const [extra, setExtra] = useState(null);
  const [user, setUser]   = useState(() => {
    try { return JSON.parse(localStorage.getItem('yms_user')); } catch { return null; }
  });

  useEffect(() => {
    if (user && getToken()) setPage('dashboard');
  }, []);

  const handleLogin = (u) => { setUser(u); setPage('dashboard'); };
  const handleLogout = () => { localStorage.removeItem('yms_token'); localStorage.removeItem('yms_user'); setUser(null); setPage('login'); };
  const onNav = (p, e=null) => { setPage(p); setExtra(e); };

  if (!user || !getToken()) return <Login onLogin={handleLogin} />;

  // Redirect if role can't access the current page
  const role = user?.role || '';
  const defaultPage = can(role,'dashboard') ? 'dashboard' : 'inventory';

  return (
    <div className="min-h-screen flex flex-col">
      <Header user={user} onLogout={handleLogout} onNav={onNav} currentPage={page} />
      {page === 'dashboard' && can(role,'dashboard') && <Dashboard onNav={onNav} />}
      {page === 'inventory' && can(role,'inventory') && <Inventory onNav={onNav} user={user} />}
      {page === 'newentry'  && can(role,'newEntry')  && <NewEntry  onBack={()=>onNav('inventory')} />}
      {page === 'detail'    && can(role,'inventory')  && <VehicleDetail vehicleId={extra} user={user} onBack={()=>onNav('inventory')} />}
      {page === 'projects'    && can(role,'projects')    && <Projects user={user} />}
      {page === 'transfers'   && can(role,'transfers')   && <Transfers user={user} />}
      {page === 'inspections' && can(role,'inspections') && <Inspections user={user} />}
      {page === 'auctions'    && can(role,'auctions')    && <Auctions user={user} />}
      {page === 'audit'       && can(role,'audit')       && <Audit />}
      {page === 'exits'       && can(role,'exits')       && <Exits user={user} />}
      {page === 'masters'   && can(role,'masters')   && <Masters />}
      {page === 'users'     && can(role,'users')     && <UserManagement />}
      {/* Fallback for unauthorised page access */}
      {((page==='dashboard'&&!can(role,'dashboard'))||(page==='users'&&!can(role,'users'))||(page==='newentry'&&!can(role,'newEntry'))) && (
        <div className="flex-1 flex items-center justify-center">
          <div className="text-center p-10">
            <div className="text-5xl mb-4">🔒</div>
            <h2 className="text-xl font-bold text-gray-700 mb-2">Access Denied</h2>
            <p className="text-gray-500 text-sm mb-6">Your role <strong>{role}</strong> does not have permission to access this page.</p>
            <button onClick={()=>onNav(defaultPage)} className="bg-blue-600 text-white font-semibold px-6 py-2 rounded-xl text-sm hover:bg-blue-700">Go Back</button>
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
