<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YMS Pro - Yard Inventory Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: Inter, system-ui, sans-serif; }
    .badge { display:inline-block; padding:2px 10px; border-radius:9999px; font-size:11px; font-weight:600; color:#fff; }
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
  </style>
</head>
<body class="bg-gray-100">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ── API helpers ── */
const getToken = () => localStorage.getItem('yms_token');
const apiFetch = async (url, opts = {}) => {
  const token = getToken();
  const res = await fetch(url, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
      ...(opts.headers || {}),
    },
  });
  if (res.status === 401) {
    localStorage.removeItem('yms_token');
    localStorage.removeItem('yms_user');
    window.location.reload();
  }
  return res;
};

/* ── Role config ── */
const ROLES = ['Admin','Operations','Yard','Client'];
const ROLE_COLORS = { Admin:'bg-red-600', Operations:'bg-blue-600', Yard:'bg-green-600', Client:'bg-purple-600' };
const ROLE_PERMS = {
  Admin:      { dashboard:true,  inventory:true,  newEntry:true,  projects:true,  exits:true,  approveExit:true,  transfers:true,  inspections:true,  auctions:true,  audit:true,  users:true,  masters:true,  deleteVehicle:true  },
  Operations: { dashboard:true,  inventory:true,  newEntry:true,  projects:true,  exits:true,  approveExit:false, transfers:true,  inspections:true,  auctions:true,  audit:false, users:false, masters:false, deleteVehicle:false },
  Yard:       { dashboard:false, inventory:true,  newEntry:true,  projects:true,  exits:true,  approveExit:false, transfers:true,  inspections:false, auctions:false, audit:false, users:false, masters:false, deleteVehicle:false },
  Client:     { dashboard:false, inventory:true,  newEntry:false, projects:true,  exits:false, approveExit:false, transfers:false, inspections:false, auctions:false, audit:false, users:false, masters:false, deleteVehicle:false },
};
const can = (role, perm) => ROLE_PERMS[role]?.[perm] ?? false;

/* ── Status badge colours ── */
const RUNNING = { Running:'bg-green-600','Red/Idle':'bg-red-600',Auctioned:'bg-purple-600',Released:'bg-blue-500',Sold:'bg-teal-600',Scrap:'bg-gray-500' };
const KEY     = { Yes:'bg-yellow-500',No:'bg-orange-500','Duplicate Key':'bg-amber-600',Missing:'bg-red-500' };
const RC      = { Submitted:'bg-blue-600',Pending:'bg-gray-400','Not Available':'bg-red-400',Duplicate:'bg-orange-600' };
const Badge = ({ text, map }) => <span className={`badge ${map[text]||'bg-gray-400'}`}>{text}</span>;

/* ── Spinner ── */
const Spinner = () => (
  <div className="flex justify-center py-20">
    <div className="h-10 w-10 animate-spin rounded-full border-4 border-blue-200 border-t-blue-600" />
  </div>
);

/* ── Header ── */
const Header = ({ user, onLogout, onNav, currentPage }) => {
  const initials = user?.fullName?.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2) || 'JD';
  const role = user?.role || '';
  const NavBtn = ({ page, label }) => (
    <button onClick={()=>onNav(page)}
      className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-colors ${currentPage===page ? 'bg-white text-blue-950' : 'hover:bg-blue-800 text-blue-100'}`}>
      {label}
    </button>
  );
  return (
    <header className="bg-blue-950 text-white px-5 py-3 flex justify-between items-center shadow-lg">
      <div className="flex items-center gap-4">
        <div className="flex items-center gap-2 cursor-pointer" onClick={()=>onNav(can(role,'dashboard')?'dashboard':'inventory')}>
          <div className="bg-white text-blue-950 font-bold rounded-lg px-2.5 py-1 text-sm">Y</div>
          <h1 className="text-lg font-bold">YMS Pro</h1>
        </div>
        <nav className="flex items-center gap-1 ml-2">
          {can(role,'dashboard') && <NavBtn page="dashboard" label="Dashboard"  />}
          {can(role,'inventory') && <NavBtn page="inventory" label="Inventory"  />}
          {can(role,'projects')    && <NavBtn page="projects"    label="Projects"   />}
          {can(role,'transfers')   && <NavBtn page="transfers"   label="Transfers"  />}
          {can(role,'inspections') && <NavBtn page="inspections" label="Inspection" />}
          {can(role,'auctions')    && <NavBtn page="auctions"    label="Auctions"   />}
          {can(role,'exits')       && <NavBtn page="exits"       label="Exits"      />}
          {can(role,'masters')     && <NavBtn page="masters"     label="Masters"    />}
          {can(role,'audit')       && <NavBtn page="audit"       label="Audit"      />}
          {can(role,'users')       && <NavBtn page="users"       label="Users"      />}
        </nav>
      </div>
      <div className="flex items-center gap-3">
        {role && <span className={`badge ${ROLE_COLORS[role]||'bg-gray-500'} text-xs`}>{role}</span>}
        {can(role,'users') && (
          <a href="/swagger" target="_blank"
            className="bg-blue-800 hover:bg-blue-700 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors">
            API Docs
          </a>
        )}
        <div className="flex items-center gap-2">
          <span className="text-sm text-blue-200">{user?.fullName}</span>
          <button onClick={onLogout}
            className="w-9 h-9 rounded-full bg-white text-blue-950 flex items-center justify-center font-bold text-sm hover:bg-blue-100"
            title="Logout">
            {initials}

        </div>

  );
};

/* ── Login ── */
const Login = ({ onLogin }) => {
  const [form, setForm] = useState({ email:'admin@yms.com', password:'Admin@123' });
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault(); setError(''); setLoading(true);
    try {
      const res = await fetch('/api/auth/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(form),
      });
      if (!res.ok) { setError('Invalid email or password'); return; }
      const data = await res.json();
      localStorage.setItem('yms_token', data.token);
      localStorage.setItem('yms_user', JSON.stringify({ fullName:data.fullName, email:data.email, role:data.role }));
      onLogin({ fullName:data.fullName, email:data.email, role:data.role });
    } catch { setError('Cannot connect to server'); }
    finally { setLoading(false); }
  };

  return (
    <div className="min-h-screen bg-blue-950 flex items-center justify-center p-4">
      <div className="w-full max-w-md">
        <div className="text-center mb-8">
          <div className="inline-flex items-center justify-center w-14 h-14 bg-white rounded-2xl mb-4">
            <span className="text-blue-950 text-2xl font-bold">Y</span>
          </div>
          <h1 className="text-3xl font-bold text-white">YMS Pro</h1>
          <p className="text-blue-300 mt-1">Yard Inventory Management System</p>
        </div>
        <div className="bg-white rounded-2xl shadow-2xl p-8">
          <h2 className="text-xl font-bold text-gray-800 mb-6">Sign In</h2>
          {error && <div className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm">{error}</div>}
          <form onSubmit={handleSubmit} className="space-y-4">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Email</label>
              <input type="email" required value={form.email} onChange={e=>setForm({...form,email:e.target.value})}
                className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Password</label>
              <input type="password" required value={form.password} onChange={e=>setForm({...form,password:e.target.value})}
                className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <button type="submit" disabled={loading}
              className="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-60 text-white font-semibold py-2.5 rounded-lg transition-colors mt-2">
              {loading ? 'Signing in…' : 'Sign In'}
            </button>
          </form>
          <p className="text-center text-xs text-gray-400 mt-6">Default: admin@yms.com / Admin@123</p>
        </div>
      </div>
    </div>
  );
};

/* ── Dashboard ── */
const DONUT_COLORS = ['#3B82F6','#22C55E','#F59E0B','#8B5CF6','#9CA3AF','#EC4899','#14B8A6','#EF4444'];

// KPI card with icon + optional delta
const Kpi = ({ label, value, sub, icon, valueColor='text-gray-900', delta }) => (
  <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
    <div className="flex items-start justify-between">
      <div>
        <p className="text-gray-500 text-xs">{label}</p>
        <h2 className={`text-2xl font-bold mt-1 ${valueColor}`}>{value}</h2>
      </div>
      <div className="text-xl opacity-80">{icon}</div>
    </div>
    <p className="text-xs mt-2">
      {delta !== undefined && delta !== null && (
        <span className={delta >= 0 ? 'text-green-600' : 'text-red-600'}>
          {delta >= 0 ? '▲' : '▼'} {Math.abs(delta)}%{' '}
        </span>
      )}
      <span className="text-gray-400">{sub}</span>
    </p>
  </div>
);

// Pure-SVG line chart
const LineChart = ({ points }) => {
  if (!points?.length) return <div className="h-48 flex items-center justify-center text-gray-300 text-sm">No data</div>;
  const w = 460, h = 180, pad = 28;
  const vals = points.map(p => p.count);
  const max = Math.max(...vals, 1), min = Math.min(...vals, 0);
  const range = max - min || 1;
  const x = i => pad + i * (w - pad * 2) / Math.max(1, points.length - 1);
  const y = v => h - pad - (v - min) * (h - pad * 2) / range;
  const line = points.map((p, i) => `${x(i)},${y(p.count)}`).join(' ');
  const area = `${pad},${h-pad} ${line} ${x(points.length-1)},${h-pad}`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-48">
      <polygon points={area} fill="#3B82F6" opacity="0.08" />
      <polyline points={line} fill="none" stroke="#3B82F6" strokeWidth="2.5" />
      {points.map((p, i) => <circle key={i} cx={x(i)} cy={y(p.count)} r="3.5" fill="#3B82F6" />)}
      {points.map((p, i) => <text key={'t'+i} x={x(i)} y={h-8} fontSize="9" fill="#9CA3AF" textAnchor="middle">{p.date.split(' ')[1]}</text>)}
    </svg>
  );
};

// Grouped bar chart (entries vs exits)
const BarChart = ({ points }) => {
  if (!points?.length) return <div className="h-48 flex items-center justify-center text-gray-300 text-sm">No data</div>;
  const max = Math.max(...points.flatMap(p => [p.entries, p.exits]), 1);
  return (
    <div className="h-48 flex items-end justify-between gap-2 px-1">
      {points.map((p, i) => (
        <div key={i} className="flex-1 flex flex-col items-center gap-1">
          <div className="w-full flex items-end justify-center gap-0.5 h-40">
            <div className="w-2.5 bg-green-500 rounded-t" style={{height:`${p.entries/max*100}%`}} title={`Entries: ${p.entries}`}></div>
            <div className="w-2.5 bg-blue-500 rounded-t" style={{height:`${p.exits/max*100}%`}} title={`Exits: ${p.exits}`}></div>
          </div>
          <span className="text-[9px] text-gray-400">{p.date.split(' ')[1]}</span>
        </div>
      ))}
    </div>
  );
};

// Donut chart (SVG stroke-dasharray)
const Donut = ({ slices, total }) => {
  const r = 60, c = 2 * Math.PI * r;
  let offset = 0;
  return (
    <div className="flex items-center gap-6">
      <svg viewBox="0 0 160 160" className="w-40 h-40 flex-shrink-0">
        <g transform="rotate(-90 80 80)">
          {slices.map((s, i) => {
            const len = (s.percent / 100) * c;
            const el = (
              <circle key={i} cx="80" cy="80" r={r} fill="none"
                stroke={DONUT_COLORS[i % DONUT_COLORS.length]} strokeWidth="20"
                strokeDasharray={`${len} ${c - len}`} strokeDashoffset={-offset} />
            );
            offset += len;
            return el;
          })}
        </g>
        <text x="80" y="76" textAnchor="middle" fontSize="20" fontWeight="bold" fill="#111827">{total.toLocaleString('en-IN')}</text>
        <text x="80" y="94" textAnchor="middle" fontSize="10" fill="#9CA3AF">Total</text>
      </svg>
      <div className="flex-1 space-y-1.5">
        {slices.map((s, i) => (
          <div key={i} className="flex items-center justify-between text-sm">
            <span className="flex items-center gap-2">
              <span className="w-2.5 h-2.5 rounded-full" style={{background:DONUT_COLORS[i % DONUT_COLORS.length]}}></span>
              {s.type}
            </span>
            <span className="text-gray-500">{s.count.toLocaleString('en-IN')} ({s.percent}%)</span>
          </div>
        ))}
      </div>
    </div>
  );
};

const RUNNING_BADGE = { Running:'bg-green-100 text-green-700','Red/Idle':'bg-red-100 text-red-700' };
const occBar = pct => pct >= 90 ? 'bg-red-500' : pct >= 75 ? 'bg-amber-500' : 'bg-green-500';

const Dashboard = ({ onNav }) => {
  const [d, setD] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    apiFetch('/api/dashboard/overview')
      .then(r => r.ok ? r.json() : null)
      .then(setD)
      .catch(() => {})
      .finally(() => setLoading(false));
  }, []);

  if (loading) return <div className="p-6"><Spinner /></div>;
  if (!d) return <div className="p-6 text-gray-400">Unable to load dashboard.</div>;

  const n = v => Number(v ?? 0).toLocaleString('en-IN');

  return (
    <div className="p-6 space-y-5">
      {/* Header */}
      <div className="flex items-center justify-between">
        <div>
          <h2 className="text-2xl font-bold text-gray-900">Dashboard</h2>
          <p className="text-sm text-gray-500">Yard Management System for Repossessed Vehicles</p>
        </div>
        <button onClick={()=>onNav('inventory')} className="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-4 py-2 rounded-lg text-sm">
          View Inventory →
        </button>
      </div>

      {/* KPI row 1 */}
      <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
        <Kpi label="Total Inventory" value={n(d.totalInventory)} sub="Vehicles in yard" icon="🚗" />
        <Kpi label="Entry This Month" value={n(d.entryThisMonth)} sub="vs last month" delta={d.entryMonthDelta} valueColor="text-green-600" icon="📈" />
        <Kpi label="Entry Today" value={n(d.entryToday)} sub="Vehicles entered" valueColor="text-red-600" icon="↘️" />
        <Kpi label="Exit This Month" value={n(d.exitThisMonth)} sub="vs last month" delta={d.exitMonthDelta} valueColor="text-blue-600" icon="➡️" />
        <Kpi label="Exit Today" value={n(d.exitToday)} sub="Vehicles exited" valueColor="text-amber-600" icon="↗️" />
        <Kpi label="Total Exited (All Time)" value={n(d.totalExitedAllTime)} sub="Total vehicles exited" valueColor="text-amber-600" icon="📊" />
      </div>

      {/* KPI row 2 */}
      <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
        <Kpi label="> 30 Days Stock" value={n(d.over30DaysStock)} sub="Needs attention" valueColor="text-gray-900" icon="⚠️" />
        <Kpi label="Legal Hold Stock" value={n(d.legalHoldStock)} sub="Under legal process" icon="⚖️" />
        <Kpi label="Upcoming Auction" value={n(d.upcomingAuction)} sub="This month" valueColor="text-green-600" icon="🔨" />
        <Kpi label="Auction Completed" value={n(d.auctionCompleted)} sub="This month" icon="🏆" />
        <Kpi label="Average Holding Days" value={d.averageHoldingDays} sub="Days" icon="⏱️" />
        <Kpi label="Occupancy" value={`${d.occupancyPercent}%`} sub="Yard Capacity" valueColor="text-blue-600" icon="🥧" />
      </div>

      {/* Charts */}
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
          <h3 className="font-semibold text-gray-700 mb-3">Inventory Trend <span className="text-xs text-gray-400">· Last 7 Days</span></h3>
          <LineChart points={d.inventoryTrend} />
        </div>
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
          <h3 className="font-semibold text-gray-700 mb-1">Entries vs Exits <span className="text-xs text-gray-400">· Last 7 Days</span></h3>
          <div className="flex gap-4 text-xs text-gray-500 mb-2">
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-green-500"></span>Entries</span>
            <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-blue-500"></span>Exits</span>
          </div>
          <BarChart points={d.entriesExits} />
        </div>
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
          <h3 className="font-semibold text-gray-700 mb-3">Inventory by Vehicle Type</h3>
          {d.vehicleTypeDistribution?.length
            ? <Donut slices={d.vehicleTypeDistribution} total={d.totalInventory} />

        </div>
      </div>

      {/* Tables */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        {/* Recently Added */}
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div className="flex items-center justify-between px-5 py-3 border-b">

            <button onClick={()=>onNav('inventory')} className="text-blue-600 text-sm font-medium hover:underline">View All →</button>
          </div>
          <table className="w-full text-sm">
            <thead className="text-xs text-gray-500 border-b">
              <tr>{['Reg. Number','Vehicle','Category','Entry Date','Yard','Status'].map(h=><th key={h} className="px-4 py-2 text-left font-medium">{h}</th>)}</tr>
            </thead>
            <tbody>
              {d.recentVehicles?.length ? d.recentVehicles.map((v,i)=>(
                <tr key={i} className="border-b last:border-0 hover:bg-gray-50">
                  <td className="px-4 py-2.5 font-mono text-xs">{v.registrationNumber}</td>
                  <td className="px-4 py-2.5">{v.vehicle||'—'}</td>
                  <td className="px-4 py-2.5 text-gray-500">{v.category}</td>
                  <td className="px-4 py-2.5 text-gray-500 text-xs">{new Date(v.entryDate).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</td>
                  <td className="px-4 py-2.5">{v.yard}</td>

        {/* Yard Wise */}

                  <td className="px-4 py-2.5">
                    <div className="flex items-center gap-2">
                      <div className="flex-1 bg-gray-100 rounded-full h-1.5 max-w-[120px]">
                        <div className={`${occBar(y.occupancyPercent)} h-1.5 rounded-full`} style={{width:`${Math.min(100,y.occupancyPercent)}%`}}></div>
                      </div>
                      <span className="text-xs text-gray-600">{y.occupancyPercent}%</span>
                    </div>
                  </td>
                  <td className="px-4 py-2.5">{y.over30Days}</td>
                </tr>
              )) : <tr><td colSpan={4} className="text-center py-10 text-gray-300">No yards yet</td></tr>}
            </tbody>
          </table>
        </div>
      </div>

      {/* Footer strip */}
      <div className="bg-white rounded-xl shadow-sm border border-gray-100 px-6 py-4 flex flex-wrap items-center justify-between gap-4 text-sm">
        <span className="flex items-center gap-2 text-gray-600">🏭 <strong>{d.totalYards}</strong> Total Yards</span>
        <span className="flex items-center gap-2 text-gray-600">👥 <strong>{d.activeUsers}</strong> Active Users</span>
        <span className="flex items-center gap-2 text-gray-600"><span className="w-2.5 h-2.5 rounded-full bg-green-500"></span> System Status: <strong className="text-green-600">Operational</strong></span>
        <span className="flex items-center gap-2 text-gray-400 text-xs">Last Updated: {new Date().toLocaleString('en-IN')}</span>
      </div>
    </div>
  );
};

/* ── Inventory ── */
const DEFAULT_FILTERS = { clientName:'',state:'',yardName:'',yardCity:'',vehicleType:'',loanNumber:'',registrationNumber:'',chassisNumber:'',engineNumber:'',runningStatus:'',keyStatus:'',rcStatus:'',entryFrom:'',entryTo:'' };

const Inventory = ({ onNav, user }) => {
  const importRef = useRef(null);
  const [importing, setImporting]     = useState(false);
  const [importResult, setImportResult] = useState(null);
  const [exporting, setExporting]     = useState(false);
  const [filters, setFilters] = useState(DEFAULT_FILTERS);
  const [applied, setApplied] = useState(DEFAULT_FILTERS);
  const [data, setData]       = useState({ items:[], totalCount:0, totalPages:1 });
  const [page, setPage]       = useState(1);
  const [pageSize, setPageSize] = useState(25);
  const [loading, setLoading] = useState(false);
  const [masters, setMasters] = useState({ states:[], vehicleTypes:[], runningStatuses:[] });

  useEffect(() => {
    Promise.all([
      apiFetch('/api/masters/states').then(r=>r.json()),
      apiFetch('/api/masters/vehicle-types').then(r=>r.json()),
      apiFetch('/api/masters/running-statuses').then(r=>r.json()),
    ]).then(([states, vehicleTypes, runningStatuses]) =>
      setMasters({ states, vehicleTypes, runningStatuses })
    ).catch(()=>{});
  }, []);

  const fetchData = useCallback(async () => {
    setLoading(true);
    try {
      const params = new URLSearchParams({ page, pageSize });
      Object.entries(applied).forEach(([k,v]) => { if(v) params.append(k,v); });
      const res = await apiFetch(`/api/inventory?${params}`);
      if (res.ok) setData(await res.json());
    } catch {}
    finally { setLoading(false); }
  }, [applied, page, pageSize]);

  useEffect(() => { fetchData(); }, [fetchData]);

  const set = (k,v) => setFilters(f=>({...f,[k]:v}));
  const handleSearch = () => { setPage(1); setApplied({...filters}); };
  const handleClear  = () => { setFilters(DEFAULT_FILTERS); setApplied(DEFAULT_FILTERS); setPage(1); };

  /* ── Export ── */
  const onExport = async () => {
    setExporting(true);
    try {
      const params = new URLSearchParams({ page:1, pageSize:99999 });
      Object.entries(applied).forEach(([k,v]) => { if(v) params.append(k,v); });
      const token = localStorage.getItem('yms_token');
      const res = await fetch(`/api/inventory/export?${params}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (!res.ok) { alert('Export failed'); return; }
      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url;
      a.download = `YMS_Inventory_${new Date().toISOString().slice(0,10)}.xlsx`;
      a.click();
      URL.revokeObjectURL(url);
    } catch(e) { alert('Export error: ' + e.message); }
    finally { setExporting(false); }
  };

  /* ── Sample Template ── */
  const onDownloadSample = async () => {
    try {
      const token = localStorage.getItem('yms_token');
      const res = await fetch('/api/inventory/sample-template', {
        headers: token ? { Authorization: `Bearer ${token}` } : {}
      });
      if (!res.ok) { alert('Could not download template'); return; }
      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'YMS_Import_Template.xlsx';
      a.click();
      URL.revokeObjectURL(url);
    } catch(e) { alert('Download error: ' + e.message); }
  };

  /* ── Import ── */
  const onImportClick = () => importRef.current?.click();
  const onFileSelected = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    e.target.value = '';    // reset so same file can be re-selected
    setImporting(true);
    try {
      const formData = new FormData();
      formData.append('file', file);
      const token = localStorage.getItem('yms_token');
      const res = await fetch('/api/inventory/import', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
        body: formData
      });
      const result = await res.json();
      setImportResult(result);
      if (result.successCount > 0) fetchData();   // refresh grid
    } catch(err) { alert('Import error: ' + err.message); }
    finally { setImporting(false); }
  };

  const inp = "w-full border border-gray-300 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500";

  return (
    <div className="flex h-[calc(100vh-56px)] overflow-hidden">

      {/* Import loading overlay */}
      {importing && (
        <div className="fixed inset-0 z-50 flex flex-col items-center justify-center" style={{background:'rgba(0,0,0,0.5)'}}>
          <div className="bg-white rounded-2xl p-8 text-center shadow-2xl">
            <div className="h-12 w-12 animate-spin rounded-full border-4 border-blue-200 border-t-blue-600 mx-auto mb-4" />
            <p className="font-semibold text-gray-700">Importing Excel…</p>
            <p className="text-sm text-gray-400 mt-1">Please wait while data is being processed</p>
          </div>
        </div>
      )}

      {/* Import Result Modal */}
      {importResult && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:'rgba(0,0,0,0.5)'}}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[80vh] flex flex-col">
            <div className="flex items-center justify-between px-6 py-4 border-b">
              <h3 className="text-lg font-bold text-gray-800">Import Result</h3>
              <button onClick={()=>setImportResult(null)} className="text-gray-400 hover:text-gray-600 text-xl font-bold">×</button>
            </div>
            <div className="p-6">
              <div className="grid grid-cols-3 gap-3 mb-4">
                <div className="bg-blue-50 rounded-xl p-4 text-center">
                  <p className="text-2xl font-bold text-blue-700">{importResult.totalRows}</p>
                  <p className="text-xs text-gray-500 mt-1">Total Rows</p>
                </div>
                <div className="bg-green-50 rounded-xl p-4 text-center">
                  <p className="text-2xl font-bold text-green-700">{importResult.successCount}</p>
                  <p className="text-xs text-gray-500 mt-1">Imported</p>
                </div>
                <div className="bg-red-50 rounded-xl p-4 text-center">
                  <p className="text-2xl font-bold text-red-700">{importResult.failedCount}</p>
                  <p className="text-xs text-gray-500 mt-1">Failed</p>
                </div>
              </div>
              {importResult.errors?.length > 0 && (
                <div className="overflow-y-auto max-h-52">
                  <p className="text-xs font-semibold text-red-600 mb-2">Errors ({importResult.errors.length}):</p>
                  <table className="w-full text-xs border rounded-xl overflow-hidden">
                    <thead className="bg-red-50">
                      <tr>
                        <th className="px-3 py-2 text-left text-gray-600">Row</th>
                        <th className="px-3 py-2 text-left text-gray-600">Field</th>
                        <th className="px-3 py-2 text-left text-gray-600">Error</th>
                      </tr>
                    </thead>
                    <tbody>
                      {importResult.errors.map((e,i) => (
                        <tr key={i} className="border-t">
                          <td className="px-3 py-1.5 font-mono">{e.row}</td>
                          <td className="px-3 py-1.5 text-orange-600 font-medium">{e.field}</td>
                          <td className="px-3 py-1.5 text-red-600">{e.message}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
            <div className="px-6 pb-5 flex justify-end">
              <button onClick={()=>setImportResult(null)} className="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-xl text-sm">
                Done
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Sidebar */}
      <aside className="w-64 bg-white shadow-lg p-4 overflow-y-auto flex-shrink-0 border-r">
        <h2 className="text-base font-bold mb-4 flex items-center gap-2 text-gray-800">
          <span className="text-blue-600">☰</span> Search Filters
        </h2>
        <div className="space-y-3 text-xs">
          {[
            {l:'Client Name',k:'clientName',ph:'Client name'},
            {l:'Loan Number',k:'loanNumber',ph:'Loan number'},
            {l:'Registration No',k:'registrationNumber',ph:'e.g. MH01AB1234'},
            {l:'Chassis No',k:'chassisNumber',ph:'Chassis number'},
            {l:'Engine No',k:'engineNumber',ph:'Engine number'},
            {l:'Yard Name',k:'yardName',ph:'Yard name'},
            {l:'Yard City',k:'yardCity',ph:'City'},
          ].map(({l,k,ph})=>(
            <div key={k}>
              <label className="block font-semibold text-gray-600 mb-1">{l}</label>
              <input className={inp} placeholder={ph} value={filters[k]} onChange={e=>set(k,e.target.value)} />
            </div>
          ))}

          <div>
            <label className="block font-semibold text-gray-600 mb-1">State</label>
            <select className={inp} value={filters.state} onChange={e=>set('state',e.target.value)}>
              <option value="">All States</option>
              {masters.states.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <label className="block font-semibold text-gray-600 mb-1">Vehicle Type</label>
            <select className={inp} value={filters.vehicleType} onChange={e=>set('vehicleType',e.target.value)}>
              <option value="">All Types</option>
              {masters.vehicleTypes.map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <div>
            <label className="block font-semibold text-gray-600 mb-1">Running Status</label>
            <select className={inp} value={filters.runningStatus} onChange={e=>set('runningStatus',e.target.value)}>
              <option value="">All</option>
              {masters.runningStatuses.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <label className="block font-semibold text-gray-600 mb-1">Key Status</label>
            <select className={inp} value={filters.keyStatus} onChange={e=>set('keyStatus',e.target.value)}>
              <option value="">All</option>
              {['Yes','No','Duplicate Key','Missing'].map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <label className="block font-semibold text-gray-600 mb-1">RC Status</label>
            <select className={inp} value={filters.rcStatus} onChange={e=>set('rcStatus',e.target.value)}>
              <option value="">All</option>
              {['Submitted','Pending','Not Available','Duplicate'].map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <label className="block font-semibold text-gray-600 mb-1">Entry From</label>
            <input type="date" className={inp} value={filters.entryFrom} onChange={e=>set('entryFrom',e.target.value)} />
          </div>
          <div>
            <label className="block font-semibold text-gray-600 mb-1">Entry To</label>
            <input type="date" className={inp} value={filters.entryTo} onChange={e=>set('entryTo',e.target.value)} />
          </div>

          <button onClick={handleSearch} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-xl text-xs transition-colors">
            Search
          </button>
          <button onClick={handleClear} className="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 rounded-xl text-xs transition-colors">
            Clear Filters
          </button>
        </div>
      </aside>

      {/* Main content */}
      <div className="flex-1 p-4 overflow-y-auto">
        <div className="bg-white rounded-2xl shadow-md overflow-hidden">
          {/* Toolbar */}
          <div className="flex items-center justify-between px-5 py-3 border-b">
            <div className="flex items-center gap-2">
              <span className="font-semibold text-gray-700">Search Results</span>
              {!loading && <span className="text-sm text-gray-500">({data.totalCount.toLocaleString()} found)</span>}
            </div>
            <div className="flex items-center gap-2">
              {can(user?.role,'newEntry') && (
                <button onClick={()=>onNav('newentry')} className="bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-4 py-1.5 rounded-xl transition-colors">
                  + New Entry
                </button>
              )}
              {can(user?.role,'newEntry') && (
                <button onClick={onImportClick} className="bg-orange-500 hover:bg-orange-600 text-white text-sm font-semibold px-4 py-1.5 rounded-xl transition-colors">
                  ↑ Import Excel
                </button>
              )}
              <button onClick={onExport} disabled={exporting} className="bg-green-600 hover:bg-green-700 disabled:opacity-60 text-white text-sm font-semibold px-4 py-1.5 rounded-xl transition-colors">
                {exporting ? 'Exporting…' : '↓ Export Excel'}
              </button>
              <button onClick={onDownloadSample} className="bg-gray-500 hover:bg-gray-600 text-white text-sm font-semibold px-4 py-1.5 rounded-xl transition-colors">
                📋 Sample
              </button>
              <input ref={importRef} type="file" accept=".xlsx,.xls" className="hidden" onChange={onFileSelected} />
            </div>
          </div>

          {loading ? <Spinner /> : (
            <>
              <div className="overflow-x-auto">
                <table className="w-full text-xs min-w-[1050px]">
                  <thead className="bg-blue-600 text-white">
                    <tr>
                      {['#','Yard ID','Client','Loan No','Yard','City','State','Type','Reg No','Chassis','Entry Date','Running','Key','RC','Charges','Action'].map(h=>(
                        <th key={h} className="px-3 py-3 text-left font-semibold whitespace-nowrap">{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {data.items.length === 0 ? (
                      <tr><td colSpan={16} className="text-center py-16 text-gray-400">No records found</td></tr>
                    ) : data.items.map((v,i)=>(
                      <tr key={v.id} className="border-b hover:bg-blue-50 transition-colors">
                        <td className="px-3 py-2 text-gray-500">{(page-1)*pageSize+i+1}</td>
                        <td className="px-3 py-2 font-mono">{v.id}</td>
                        <td className="px-3 py-2">{v.clientName}</td>
                        <td className="px-3 py-2 font-mono">{v.loanNumber}</td>
                        <td className="px-3 py-2">{v.yardName}</td>
                        <td className="px-3 py-2">{v.yardCity}</td>
                        <td className="px-3 py-2">{v.yardState}</td>
                        <td className="px-3 py-2">{v.vehicleType}</td>
                        <td className="px-3 py-2 font-mono">{v.registrationNumber}</td>
                        <td className="px-3 py-2 font-mono">{v.chassisNumber}</td>
                        <td className="px-3 py-2">{new Date(v.entryDate).toLocaleDateString('en-IN')}</td>
                        <td className="px-3 py-2"><Badge text={v.runningStatus} map={RUNNING} /></td>
                        <td className="px-3 py-2"><Badge text={v.keyStatus} map={KEY} /></td>
                        <td className="px-3 py-2"><Badge text={v.rcStatus} map={RC} /></td>
                        <td className="px-3 py-2">
                          <div className="font-semibold text-gray-800 text-xs">₹{((v.dailyParkingRate||0)*(v.daysInYard||1)).toLocaleString('en-IN')}</div>
                          <div className="text-gray-400" style={{fontSize:'10px'}}>₹{v.dailyParkingRate||0}/d × {v.daysInYard||1}d</div>
                        </td>
                        <td className="px-3 py-2">
                          <button onClick={()=>onNav('detail', v.id)} className="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded-lg text-xs transition-colors">
                            View/Edit
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              {/* Pagination */}
              <div className="flex items-center justify-between px-5 py-3 border-t text-xs text-gray-600">
                <div className="flex items-center gap-2">
                  <span>Show</span>
                  <select className="border rounded px-2 py-1" value={pageSize} onChange={e=>{setPageSize(Number(e.target.value));setPage(1);}}>
                    {[10,25,50,100].map(s=><option key={s}>{s}</option>)}
                  </select>
                  <span>entries</span>
                </div>
                <div className="flex items-center gap-1">
                  <button className="px-3 py-1 rounded border hover:bg-gray-100 disabled:opacity-40" disabled={page===1} onClick={()=>setPage(p=>p-1)}>Previous</button>
                  {Array.from({length:Math.min(5,data.totalPages)},(_,i)=>{
                    const p = Math.max(1,Math.min(page-2,data.totalPages-4))+i;
                    return <button key={p} onClick={()=>setPage(p)} className={`px-3 py-1 rounded border ${page===p?'bg-blue-600 text-white border-blue-600':'hover:bg-gray-100'}`}>{p}</button>;
                  })}
                  <button className="px-3 py-1 rounded border hover:bg-gray-100 disabled:opacity-40" disabled={page===data.totalPages||data.totalPages===0} onClick={()=>setPage(p=>p+1)}>Next</button>
                </div>
                <span>Page {page} of {data.totalPages || 1}</span>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
};

/* ── New Entry ── */
const NewEntry = ({ onBack }) => {
  const [masters, setMasters] = useState({ clients:[], yards:[], vehicleTypes:[] });
  const [submitting, setSubmitting] = useState(false);
  const [success, setSuccess] = useState(false);
  const [error, setError] = useState('');
  const [form, setForm] = useState({
    clientId:'', yardId:'', loanNumber:'', customerName:'', branchName:'', repoDate:'',
    registrationNumber:'', chassisNumber:'', engineNumber:'',
    make:'', model:'', variant:'', fuelType:'', transmissionType:'', manufacturingYear:'',
    vehicleType:'', color:'', runningStatus:'Running', keyStatus:'Yes', rcStatus:'Pending',
    batteryCondition:'', tyreCondition:'', odometerReading:'', insuranceAvailable:false,
    dailyParkingRate:'450', towingCharges:'0', miscCharges:'0',
  });

  useEffect(() => {
    Promise.all([
      apiFetch('/api/masters/clients').then(r=>r.json()),
      apiFetch('/api/masters/yards').then(r=>r.json()),
      apiFetch('/api/masters/vehicle-types').then(r=>r.json()),
    ]).then(([clients,yards,vehicleTypes])=>setMasters({clients,yards,vehicleTypes})).catch(()=>{});
  }, []);

  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const handleSubmit = async (e) => {
    e.preventDefault(); setError(''); setSubmitting(true);
    try {
      const payload = {
        ...form,
        clientId: Number(form.clientId), yardId: Number(form.yardId),
        manufacturingYear: form.manufacturingYear ? Number(form.manufacturingYear) : null,
        odometerReading: form.odometerReading ? Number(form.odometerReading) : null,
        dailyParkingRate: Number(form.dailyParkingRate)||450,
        towingCharges: Number(form.towingCharges)||0,
        miscCharges: Number(form.miscCharges)||0,
        repoDate: form.repoDate || null,
      };
      const res = await apiFetch('/api/inventory', { method:'POST', body: JSON.stringify(payload) });
      if (!res.ok) { const err = await res.json(); setError(err.title || 'Failed to save'); return; }
      setSuccess(true);
    } catch { setError('Server error. Please try again.'); }
    finally { setSubmitting(false); }
  };

  if (success) return (
    <div className="p-6 max-w-lg mx-auto mt-10 text-center">
      <div className="bg-white rounded-2xl shadow-md p-10">
        <div className="text-5xl mb-4">✅</div>
        <h2 className="text-xl font-bold text-gray-800 mb-2">Entry Saved!</h2>
        <p className="text-gray-500 text-sm mb-6">Vehicle <strong>{form.registrationNumber}</strong> added to inventory.</p>
        <div className="flex gap-3 justify-center">
          <button onClick={()=>setSuccess(false)} className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-5 py-2 rounded-lg text-sm">Add Another</button>
          <button onClick={onBack} className="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2 rounded-lg text-sm">Back to Inventory</button>
        </div>
      </div>
    </div>
  );

  const S = ({title,children}) => (
    <div className="bg-white rounded-2xl shadow-md p-5 mb-4">
      <h3 className="font-semibold text-gray-600 mb-4 pb-2 border-b text-xs uppercase tracking-wide">{title}</h3>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">{children}</div>
    </div>
  );
  const F = ({label,children}) => (
    <div>
      <label className="block text-xs font-medium text-gray-600 mb-1">{label}</label>
      {children}
    </div>
  );
  const inp = "w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500";

  return (
    <div className="p-6 max-w-5xl mx-auto">
      <div className="flex items-center justify-between mb-5">
        <h2 className="text-2xl font-bold">New Inventory Entry</h2>
        <button onClick={onBack} className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-4 py-2 rounded-lg text-sm">← Back</button>
      </div>
      {error && <div className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm">{error}</div>}
      <form onSubmit={handleSubmit}>
        <S title="Loan & Ownership">
          <F label="Client *">
            <select required className={inp} value={form.clientId} onChange={e=>set('clientId',e.target.value)}>
              <option value="">Select Client</option>
              {masters.clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </F>
          <F label="Loan Number *"><input required className={inp} value={form.loanNumber} onChange={e=>set('loanNumber',e.target.value)} placeholder="e.g. 03343955" /></F>
          <F label="Customer Name"><input className={inp} value={form.customerName} onChange={e=>set('customerName',e.target.value)} placeholder="Full name" /></F>
          <F label="Branch Name"><input className={inp} value={form.branchName} onChange={e=>set('branchName',e.target.value)} placeholder="Branch" /></F>
          <F label="Repo Date"><input type="date" className={inp} value={form.repoDate} onChange={e=>set('repoDate',e.target.value)} /></F>
        </S>

        <S title="Vehicle Information">
          <F label="Registration No *"><input required className={inp+" uppercase"} value={form.registrationNumber} onChange={e=>set('registrationNumber',e.target.value.toUpperCase())} placeholder="MH01AB1234" /></F>
          <F label="Chassis No *"><input required className={inp+" uppercase"} value={form.chassisNumber} onChange={e=>set('chassisNumber',e.target.value.toUpperCase())} placeholder="CHASSIS001" /></F>
          <F label="Engine No *"><input required className={inp} value={form.engineNumber} onChange={e=>set('engineNumber',e.target.value.toUpperCase())} placeholder="ENGINE001" /></F>
          <F label="Vehicle Type *">
            <select required className={inp} value={form.vehicleType} onChange={e=>set('vehicleType',e.target.value)}>
              <option value="">Select Type</option>
              {masters.vehicleTypes.map(t=><option key={t}>{t}</option>)}
            </select>
          </F>
          <F label="Make"><input className={inp} value={form.make} onChange={e=>set('make',e.target.value)} placeholder="e.g. Maruti" /></F>
          <F label="Model"><input className={inp} value={form.model} onChange={e=>set('model',e.target.value)} placeholder="e.g. Swift" /></F>
          <F label="Fuel Type">
            <select className={inp} value={form.fuelType} onChange={e=>set('fuelType',e.target.value)}>
              <option value="">Select</option>
              {['Petrol','Diesel','CNG','Electric','Hybrid'].map(f=><option key={f}>{f}</option>)}
            </select>
          </F>
          <F label="Manufacturing Year"><input type="number" min="2000" max="2030" className={inp} value={form.manufacturingYear} onChange={e=>set('manufacturingYear',e.target.value)} placeholder="2022" /></F>
          <F label="Color"><input className={inp} value={form.color} onChange={e=>set('color',e.target.value)} placeholder="e.g. White" /></F>
        </S>

        <S title="Yard & Status">
          <F label="Yard *">
            <select required className={inp} value={form.yardId} onChange={e=>set('yardId',e.target.value)}>
              <option value="">Select Yard</option>
              {masters.yards.map(y=><option key={y.id} value={y.id}>{y.name} — {y.city}</option>)}
            </select>
          </F>
          <F label="Running Status">
            <select className={inp} value={form.runningStatus} onChange={e=>set('runningStatus',e.target.value)}>
              {['Running','Red/Idle','Auctioned','Released','Sold','Scrap'].map(s=><option key={s}>{s}</option>)}
            </select>
          </F>
          <F label="Key Status">
            <select className={inp} value={form.keyStatus} onChange={e=>set('keyStatus',e.target.value)}>
              {['Yes','No','Duplicate Key','Missing'].map(s=><option key={s}>{s}</option>)}
            </select>
          </F>
          <F label="RC Status">
            <select className={inp} value={form.rcStatus} onChange={e=>set('rcStatus',e.target.value)}>
              {['Submitted','Pending','Not Available','Duplicate'].map(s=><option key={s}>{s}</option>)}
            </select>
          </F>
          <F label="Odometer (km)"><input type="number" min="0" className={inp} value={form.odometerReading} onChange={e=>set('odometerReading',e.target.value)} placeholder="45000" /></F>
          <F label="Insurance">
            <div className="flex items-center gap-2 mt-2">
              <input type="checkbox" id="ins" checked={form.insuranceAvailable} onChange={e=>set('insuranceAvailable',e.target.checked)} className="w-4 h-4" />
              <label htmlFor="ins" className="text-sm text-gray-700">Available</label>
            </div>
          </F>
        </S>

        <S title="Charges (₹)">
          <F label="Daily Parking Rate (₹/day)"><input type="number" min="0" className={inp} value={form.dailyParkingRate} onChange={e=>set('dailyParkingRate',e.target.value)} /></F>
          <F label="Towing Charges"><input type="number" min="0" className={inp} value={form.towingCharges} onChange={e=>set('towingCharges',e.target.value)} /></F>
          <F label="Misc Charges"><input type="number" min="0" className={inp} value={form.miscCharges} onChange={e=>set('miscCharges',e.target.value)} /></F>
        </S>

        <div className="flex justify-end gap-3">
          <button type="button" onClick={onBack} className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-6 py-2 rounded-lg">Cancel</button>
          <button type="submit" disabled={submitting} className="bg-blue-600 hover:bg-blue-700 disabled:opacity-60 text-white font-semibold px-8 py-2 rounded-lg">
            {submitting ? 'Saving…' : 'Save Entry'}
          </button>
        </div>
      </form>
    </div>
  );
};

/* ── shared helpers for module pages ── */
const useVehicles = () => {
  const [vehicles, setVehicles] = useState([]);
  const loadVehicles = useCallback(async () => {
    const res = await apiFetch('/api/inventory?page=1&pageSize=500');
    if (res.ok) { const d = await res.json(); setVehicles(d.items||[]); }
  }, []);
  return [vehicles, loadVehicles];
};
const fmtMoney = n => n==null ? '—' : '₹'+Number(n).toLocaleString('en-IN');
const fmtDate  = d => d ? new Date(d).toLocaleDateString('en-IN') : '—';
const ModalShell = ({title, onClose, children}) => (
  <div className="fixed inset-0 z-40 flex items-center justify-center p-4" style={{background:'rgba(0,0,0,0.5)'}}>
    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto">
      <div className="flex items-center justify-between px-6 py-4 border-b sticky top-0 bg-white">
        <h3 className="text-lg font-bold text-gray-800">{title}</h3>
        <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl font-bold">×</button>
      </div>
      <div className="p-6">{children}</div>
    </div>
  </div>
);
const INP = "w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500";

/* ── Transfers (Module 7) ── */
const TRANSFER_COLORS = { Requested:'bg-yellow-500', Approved:'bg-blue-600', Dispatched:'bg-indigo-600', Received:'bg-green-600', Rejected:'bg-red-600', Cancelled:'bg-gray-400' };
const Transfers = ({ user }) => {
  const role = user?.role || '';
  const [rows,setRows]=useState([]); const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(false); const [vehicles,loadVehicles]=useVehicles();
  const [yards,setYards]=useState([]); const [form,setForm]=useState({vehicleId:'',toYardId:'',reason:''});
  const [err,setErr]=useState(''); const [toast,setToast]=useState('');
  const showToast=m=>{setToast(m);setTimeout(()=>setToast(''),3000);};
  const load=useCallback(async()=>{setLoading(true);try{const r=await apiFetch('/api/transfers');if(r.ok)setRows(await r.json());}catch{}finally{setLoading(false);}},[]);
  useEffect(()=>{load();apiFetch('/api/masters/yards').then(r=>r.json()).then(setYards).catch(()=>{});},[load]);
  const openCreate=()=>{setForm({vehicleId:'',toYardId:'',reason:''});setErr('');setModal(true);loadVehicles();};
  const submit=async e=>{e.preventDefault();setErr('');const r=await apiFetch('/api/transfers',{method:'POST',body:JSON.stringify({...form,vehicleId:Number(form.vehicleId),toYardId:Number(form.toYardId)})});const d=await r.json();if(!r.ok){setErr(d.message||'Error');return;}setModal(false);showToast('Transfer requested');load();};
  const act=async(id,path)=>{const r=await apiFetch(`/api/transfers/${id}/${path}`,{method:'POST',body:path==='approve'?JSON.stringify({approve:true}):undefined});if(r.ok||r.status===204){showToast('Done');load();}else{const d=await r.json();showToast(d.message||'Error');}};
  const reject=async id=>{const reason=prompt('Rejection reason:');if(reason===null)return;const r=await apiFetch(`/api/transfers/${id}/approve`,{method:'POST',body:JSON.stringify({approve:false,rejectionReason:reason})});if(r.ok||r.status===204){showToast('Rejected');load();}};
  return (<div className="p-6">
    {toast&&<div className="fixed top-4 right-4 z-50 bg-green-600 text-white px-5 py-3 rounded-xl shadow-lg text-sm">✓ {toast}</div>}
    <div className="flex items-center justify-between mb-5">
      <div><h2 className="text-2xl font-bold text-gray-800">Inter-Yard Transfers</h2><p className="text-sm text-gray-500 mt-1">Request → Approve → Dispatch → Receive</p></div>
      <button onClick={openCreate} className="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2 rounded-xl text-sm">+ New Transfer</button>
    </div>
    <div className="bg-white rounded-2xl shadow-md overflow-hidden">
      {loading?<Spinner/>:<table className="w-full text-sm">
        <thead className="bg-blue-600 text-white text-xs"><tr>{['#','Vehicle','From Yard','To Yard','Status','Reason','Created','Actions'].map(h=><th key={h} className="px-4 py-3 text-left whitespace-nowrap font-semibold">{h}</th>)}</tr></thead>
        <tbody>{rows.length===0?<tr><td colSpan={8} className="text-center py-16 text-gray-400">No transfers yet.</td></tr>:rows.map((r,i)=>(
          <tr key={r.id} className="border-b hover:bg-blue-50"><td className="px-4 py-3 text-gray-400 text-xs">{i+1}</td>
            <td className="px-4 py-3 font-mono text-xs font-semibold">{r.registrationNumber}</td>
            <td className="px-4 py-3">{r.fromYardName}</td><td className="px-4 py-3">{r.toYardName}</td>
            <td className="px-4 py-3"><span className={`badge ${TRANSFER_COLORS[r.status]||'bg-gray-400'}`}>{r.status}</span></td>
            <td className="px-4 py-3 text-xs">{r.reason||'—'}</td><td className="px-4 py-3 text-xs text-gray-500">{fmtDate(r.createdAt)}</td>
            <td className="px-4 py-3"><div className="flex gap-1.5 flex-wrap">
              {r.status==='Requested'&&can(role,'approveExit')&&<><button onClick={()=>act(r.id,'approve')} className="bg-green-100 hover:bg-green-200 text-green-700 px-3 py-1 rounded-lg text-xs font-medium">Approve</button><button onClick={()=>reject(r.id)} className="bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1 rounded-lg text-xs font-medium">Reject</button></>}
              {r.status==='Requested'&&!can(role,'approveExit')&&<span className="text-xs text-gray-400 italic">awaiting approval</span>}
              {r.status==='Approved'&&<button onClick={()=>act(r.id,'dispatch')} className="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-3 py-1 rounded-lg text-xs font-medium">Dispatch</button>}
              {r.status==='Dispatched'&&<button onClick={()=>act(r.id,'receive')} className="bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded-lg text-xs font-medium">Receive</button>}
              {(r.status==='Requested'||r.status==='Approved')&&<button onClick={()=>act(r.id,'cancel')} className="bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1 rounded-lg text-xs font-medium">Cancel</button>}
              {r.status==='Received'&&<span className="text-xs text-green-600 font-medium">✓ {fmtDate(r.receivedAt)}</span>}
            </div></td></tr>))}</tbody></table>}
    </div>
    {modal&&<ModalShell title="New Transfer Request" onClose={()=>setModal(false)}>
      <form onSubmit={submit} className="space-y-4">
        {err&&<div className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-2 text-sm">{err}</div>}
        <div><label className="block text-xs font-semibold text-gray-600 mb-1">Vehicle *</label><select required className={INP} value={form.vehicleId} onChange={e=>setForm(f=>({...f,vehicleId:e.target.value}))}><option value="">Select Vehicle</option>{vehicles.map(v=><option key={v.id} value={v.id}>{v.registrationNumber} — {v.yardName}</option>)}</select></div>
        <div><label className="block text-xs font-semibold text-gray-600 mb-1">Destination Yard *</label><select required className={INP} value={form.toYardId} onChange={e=>setForm(f=>({...f,toYardId:e.target.value}))}><option value="">Select Yard</option>{yards.map(y=><option key={y.id} value={y.id}>{y.name} — {y.city}</option>)}</select></div>
        <div><label className="block text-xs font-semibold text-gray-600 mb-1">Reason</label><input className={INP} value={form.reason} onChange={e=>setForm(f=>({...f,reason:e.target.value}))}/></div>
        <div className="flex justify-end gap-3 pt-2"><button type="button" onClick={()=>setModal(false)} className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-5 py-2 rounded-xl text-sm">Cancel</button><button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-xl text-sm">Create</button></div>
      </form></ModalShell>}
  </div>);
};

/* ── Inspections (Module 5) ── */

    {toast&&<div className="fixed top-4 right-4 z-50 bg-green-600 text-white px-5 py-3 rounded-xl shadow-lg text-sm">✓ {toast}</div>}
    <div className="flex items-center justify-between mb-5">

    </div>
    <div className="bg-white rounded-2xl shadow-md overflow-hidden">
      {loading?<Spinner/>:<table className="w-full text-sm">
        <thead className="bg-blue-600 text-white text-xs"><tr>{['#','Vehicle','Client','Status','Agency','Scheduled','Valuation','Actions'].map(h=><th key={h} className="px-4 py-3 text-left whitespace-nowrap font-semibold">{h}</th>)}</tr></thead>
        <tbody>{rows.length===0?<tr><td colSpan={8} className="text-center py-16 text-gray-400">No inspections yet.</td></tr>:rows.map((r,i)=>(
          <tr key={r.id} className="border-b hover:bg-blue-50"><td className="px-4 py-3 text-gray-400 text-xs">{i+1}</td>
            <td className="px-4 py-3 font-mono text-xs font-semibold">{r.registrationNumber}</td><td className="px-4 py-3">{r.clientName}</td>
            <td className="px-4 py-3"><span className={`badge ${INSP_COLORS[r.status]||'bg-gray-400'}`}>{r.status}</span></td>
            <td className="px-4 py-3 text-xs">{r.valuationAgency||'—'}</td><td className="px-4 py-3 text-xs">{fmtDate(r.scheduledDate)}</td>
            <td className="px-4 py-3 font-semibold text-xs">{fmtMoney(r.valuationAmount)}</td>

            </div></td></tr>))}</tbody></table>}

        <div><label className="block text-xs font-semibold text-gray-600 mb-1">Valuation Agency</label><input className={INP} value={form.valuationAgency} onChange={e=>setForm(f=>({...f,valuationAgency:e.target.value}))} placeholder="e.g. ABC Valuers"/></div>

        <div className="flex justify-end gap-3 pt-2"><button type="button" onClick={()=>setModal(false)} className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-5 py-2 rounded-xl text-sm">Cancel</button><button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-xl text-sm">Request</button></div>
      </form></ModalShell>}
    {completeModal&&<ModalShell title={`Complete — ${completeModal.registrationNumber}`} onClose={()=>setCompleteModal(null)}>
      <form onSubmit={complete} className="space-y-4">

      </form></ModalShell>}
  </div>);
};

        {err&&<div className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-2 text-sm">{err}</div>}
        <div><label className="block text-xs font-semibold text-gray-600 mb-1">Vehicle *</label><select required className={INP} value={form.vehicleId} onChange={e=>setForm(f=>({...f,vehicleId:e.target.value}))}><option value="">Select Vehicle</option>{vehicles.map(v=><option key={v.id} value={v.id}>{v.registrationNumber} — {v.clientName}</option>)}</select></div>
        <div><label className="block text-xs font-semibold text-gray-600 mb-1">Platform</label><select className={INP} value={form.platform} onChange={e=>setForm(f=>({...f,platform:e.target.value}))}>{['MSTC','C1 India','Internal'].map(p=><option key={p}>{p}</option>)}</select></div>
        <div><label className="block text-xs font-semibold text-gray-600 mb-1">Reserve Price (₹) *</label><input type="number" min="1" required className={INP} value={form.reservePrice} onChange={e=>setForm(f=>({...f,reservePrice:e.target.value}))}/></div>
        <div><label className="block text-xs font-semibold text-gray-600 mb-1">Auction Date</label><input type="date" className={INP} value={form.auctionDate} onChange={e=>setForm(f=>({...f,auctionDate:e.target.value}))}/></div>
        <div className="flex justify-end gap-3 pt-2"><button type="button" onClick={()=>setModal(false)} className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-5 py-2 rounded-xl text-sm">Cancel</button><button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-xl text-sm">List</button></div>
      </form></ModalShell>}
    {bidModal&&<ModalShell title={`Record Bid — ${bidModal.registrationNumber}`} onClose={()=>setBidModal(null)}>
      <form onSubmit={submitBid} className="space-y-4">
        <p className="text-xs text-gray-500">Reserve: {fmtMoney(bidModal.reservePrice)} · Current highest: {fmtMoney(bidModal.highestBid)}</p>
        <div><label className="block text-xs font-semibold text-gray-600 mb-1">Bid Amount (₹) *</label><input type="number" min="1" required className={INP} value={bid} onChange={e=>setBid(e.target.value)}/></div>
        <div className="flex justify-end gap-3 pt-2"><button type="button" onClick={()=>setBidModal(null)} className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-5 py-2 rounded-xl text-sm">Cancel</button><button type="submit" className="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2 rounded-xl text-sm">Record Bid</button></div>
      </form></ModalShell>}
    {sellModal&&<ModalShell title={`Complete Sale — ${sellModal.registrationNumber}`} onClose={()=>setSellModal(null)}>
      <form onSubmit={submitSell} className="space-y-4">
        <div><label className="block text-xs font-semibold text-gray-600 mb-1">Sale Price (₹) *</label><input type="number" min="1" required className={INP} value={sell.salePrice} onChange={e=>setSell(s=>({...s,salePrice:e.target.value}))}/></div>
        <div><label className="block text-xs font-semibold text-gray-600 mb-1">Buyer Name *</label><input required className={INP} value={sell.buyerName} onChange={e=>setSell(s=>({...s,buyerName:e.target.value}))}/></div>
        <div><label className="block text-xs font-semibold text-gray-600 mb-1">Buyer Contact</label><input className={INP} value={sell.buyerContact} onChange={e=>setSell(s=>({...s,buyerContact:e.target.value}))}/></div>
        <div className="flex justify-end gap-3 pt-2"><button type="button" onClick={()=>setSellModal(null)} className="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold px-5 py-2 rounded-xl text-sm">Cancel</button><button type="submit" className="bg-green-600 hover:bg-green-700 text-white font-semibold px-6 py-2 rounded-xl text-sm">Confirm Sale</button></div>
      </form></ModalShell>}
  </div>);
};
